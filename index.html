<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Registro de Mortalidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        /* Container invisível para exportação otimizado para vertical (WhatsApp) */
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #F8FAFC;
            width: 450px; /* Largura ideal para celular */
            padding: 20px;
        }
        /* Estilos para impressão PDF */
        @media print {
            .no-print { display: none; }
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const NEW_LOGO_URL = "https://i.imgur.com/wEozr34.png";
        const LISTA_BLOCOS_PADRAO = Array.from({ length: 10 }, (_, i) => `BLOCO ${String(i + 1).padStart(2, '0')}`);
        const LISTA_VARIEDADES = ["Syngenta BRO", "Master Tsv", "Pharlap", "Jiraya F1", "OUTRA..."];
        const MUDAS_POR_BANDEJA = 200;

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-10 10Z" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                pdf: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const addDays = (dateStr, days) => {
            const result = new Date(dateStr);
            result.setDate(result.getDate() + days);
            return result.toISOString().split('T')[0];
        };

        function App() {
            const [blocosData, setBlocosData] = useState([]);
            const [editingRef, setEditingRef] = useState(null);
            const [showExportTemplate, setShowExportTemplate] = useState(false);

            const [formData, setFormData] = useState({
                nomeBloco: 'BLOCO 01',
                dataContagem: new Date().toISOString().split('T')[0],
                perdaPlantio: '',
                perdaContagemA: '',
                perdaContagemB: '',
                transplantadoA: '', 
                transplantadoB: '',
                variedadesList: [{ 
                    id: Math.random().toString(36).substr(2, 9), 
                    nome: 'Syngenta BRO', 
                    bandejas: '', 
                    totalMudas: '', 
                    transplantadoVariedade: ''
                }]
            });

            useEffect(() => {
                const localData = localStorage.getItem('oasis_mortalidade_v17');
                if (localData) setBlocosData(JSON.parse(localData));
            }, []);

            const saveToLocal = (data) => {
                localStorage.setItem('oasis_mortalidade_v17', JSON.stringify(data));
                setBlocosData(data);
            };

            const handleBandejasChange = (id, valor) => {
                const numBandejas = parseInt(valor) || 0;
                setFormData(prev => ({
                    ...prev,
                    variedadesList: prev.variedadesList.map(v => 
                        v.id === id ? { 
                            ...v, 
                            bandejas: valor, 
                            totalMudas: valor === '' ? '' : (numBandejas * MUDAS_POR_BANDEJA).toString() 
                        } : v
                    )
                }));
            };

            const calcGeral = useMemo(() => {
                let mudasTotais = 0;
                let transplantadoTotalBloco = 0;
                
                formData.variedadesList.forEach(v => { 
                    mudasTotais += (parseInt(v.totalMudas) || 0);
                    transplantadoTotalBloco += (parseInt(v.transplantadoVariedade) || 0);
                });

                const pP = parseInt(formData.perdaPlantio) || 0;
                const pA = parseInt(formData.perdaContagemA) || 0;
                const pB = parseInt(formData.perdaContagemB) || 0;
                
                const tA = parseInt(formData.transplantadoA) || 0;
                const tB = parseInt(formData.transplantadoB) || 0;
                
                const percPlantio = mudasTotais > 0 ? ((pP / mudasTotais) * 100).toFixed(1) : 0;
                const percCampo = transplantadoTotalBloco > 0 ? (((pA + pB) / transplantadoTotalBloco) * 100).toFixed(1) : 0;
                
                return { 
                    mudasTotais, 
                    transplantadoTotalBloco, 
                    somaAreaA: tA, 
                    somaAreaB: tB, 
                    percPlantio, 
                    percCampo, 
                    pP, pA, pB 
                };
            }, [formData]);

            const handleSave = (e) => {
                e.preventDefault();
                const dataContagem = formData.dataContagem;
                const dataProxima = addDays(dataContagem, 15);
                const novoRegistro = {
                    id: editingRef ? editingRef.regId : Date.now().toString(),
                    dataContagem: dataContagem,
                    dataProxima: dataProxima,
                    mudasTotais: calcGeral.mudasTotais,
                    totalTransplantadoGeral: calcGeral.transplantadoTotalBloco,
                    somaAreaA: calcGeral.somaAreaA,
                    somaAreaB: calcGeral.somaAreaB,
                    perdaPlantio: calcGeral.pP,
                    perdaA: calcGeral.pA,
                    perdaB: calcGeral.pB,
                    percPlantio: calcGeral.percPlantio,
                    percCampo: calcGeral.percCampo,
                    variedades: formData.variedadesList.map(v => ({...v}))
                };
                let updated = [...blocosData];
                if (editingRef) {
                    updated = updated.map(b => b.nome === editingRef.blocoNome ? { ...b, registros: b.registros.filter(r => r.id !== editingRef.regId) } : b);
                }
                const bIdx = updated.findIndex(b => b.nome === formData.nomeBloco);
                if (bIdx !== -1) updated[bIdx].registros.push(novoRegistro);
                else updated.push({ id: Date.now().toString(), nome: formData.nomeBloco, registros: [novoRegistro] });
                saveToLocal(updated.filter(b => b.registros.length > 0));
                setEditingRef(null);
                setFormData({
                    nomeBloco: 'BLOCO 01',
                    dataContagem: new Date().toISOString().split('T')[0],
                    perdaPlantio: '',
                    perdaContagemA: '',
                    perdaContagemB: '',
                    transplantadoA: '',
                    transplantadoB: '',
                    variedadesList: [{ id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '' }]
                });
            };

            // Download JPEG Vertical (WhatsApp)
            const downloadJpeg = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        try {
                            const canvas = await html2canvas(element, { 
                                scale: 2, 
                                useCORS: true, 
                                backgroundColor: '#F8FAFC' 
                            });
                            const link = document.createElement('a');
                            link.download = `Oasis_WhatsApp_${new Date().toLocaleDateString('pt-PT').replace(/\//g, '-')}.jpg`;
                            link.href = canvas.toDataURL('image/jpeg', 0.8);
                            link.click();
                        } catch (err) {
                            console.error("Erro ao gerar imagem", err);
                        } finally {
                            setShowExportTemplate(false);
                        }
                    }
                }, 500);
            };

            // Download PDF (A4 Impressão)
            const downloadPdf = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        try {
                            const canvas = await html2canvas(element, { scale: 3, useCORS: true });
                            const imgData = canvas.toDataURL('image/jpeg', 1.0);
                            const { jsPDF } = window.jspdf;
                            const pdf = new jsPDF('p', 'mm', 'a4');
                            
                            const imgProps = pdf.getImageProperties(imgData);
                            const pdfWidth = pdf.internal.pageSize.getWidth();
                            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                            
                            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                            pdf.save(`Oasis_Relatorio_A4_${new Date().toLocaleDateString('pt-PT').replace(/\//g, '-')}.pdf`);
                        } catch (err) {
                            console.error("Erro ao gerar PDF", err);
                        } finally {
                            setShowExportTemplate(false);
                        }
                    }
                }, 500);
            };

            const RegistroCard = ({ reg, blocoNome, isExport = false }) => (
                <div className={`group relative bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm ${isExport ? 'mb-10 ring-1 ring-slate-100' : ''}`}>
                    {isExport && (
                        <div className="flex items-center gap-2 mb-4">
                            <div className="w-1.5 h-6 bg-emerald-600 rounded-full"></div>
                            <h4 className="font-black text-slate-800 uppercase text-sm tracking-widest">{blocoNome}</h4>
                        </div>
                    )}
                    
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-emerald-100 rounded-2xl text-emerald-700">
                                <SvgIcon name="calendar" className="w-5 h-5"/>
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Data da Contagem</p>
                                <p className="text-sm font-black text-slate-800">{reg.dataContagem.split('-').reverse().join('/')}</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Total Plantado Efetivo</p>
                            <p className="text-xl font-black text-slate-900 leading-none">{(reg.totalTransplantadoGeral || 0).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-slate-50 p-4 rounded-3xl border border-orange-100 text-center shadow-sm">
                            <p className="text-[9px] font-black text-orange-500 uppercase mb-1">Perda Bandeja</p>
                            <p className="text-2xl font-black text-orange-600 leading-none">{reg.percPlantio}%</p>
                            <p className="text-[9px] font-bold text-orange-400 mt-1 italic">(-{reg.perdaPlantio} mudas)</p>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-3xl border border-red-100 text-center shadow-sm">
                            <p className="text-[9px] font-black text-red-500 uppercase mb-1">Mortalidade Campo</p>
                            <p className="text-2xl font-black text-red-600 leading-none">{reg.percCampo}%</p>
                            <p className="text-[9px] font-bold text-red-400 mt-1 italic">(-{(reg.perdaA || 0) + (reg.perdaB || 0)} mudas)</p>
                        </div>
                    </div>

                    <div className="bg-emerald-50/50 p-4 rounded-3xl mb-6 border border-emerald-100">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="text-center">
                                <p className="text-[8px] text-emerald-600 uppercase font-black mb-1">Área A</p>
                                <p className="text-sm font-black text-emerald-800">{reg.somaAreaA || 0}</p>
                            </div>
                            <div className="text-center">
                                <p className="text-[8px] text-emerald-600 uppercase font-black mb-1">Área B</p>
                                <p className="text-sm font-black text-emerald-800">{reg.somaAreaB || 0}</p>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3 mb-6">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-2">Variedades</p>
                        {reg.variedades.map((v, i) => (
                            <div key={i} className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                                <div>
                                    <p className="font-black text-xs text-emerald-900 uppercase">{v.nome}</p>
                                    <p className="text-[9px] text-slate-400 font-bold">{v.bandejas} Bandj. | {v.totalMudas} Mudas</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[8px] font-black text-emerald-600 uppercase">Plantado</p>
                                    <p className="text-sm font-black text-emerald-800">{v.transplantadoVariedade || 0}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between items-center pt-4 border-t-2 border-dashed border-slate-100">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black text-slate-400 uppercase mb-1">Próxima Contagem (+15d)</span>
                            <span className="text-sm font-black text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-xl border border-emerald-200">
                                {reg.dataProxima ? reg.dataProxima.split('-').reverse().join('/') : '---'}
                            </span>
                        </div>
                        
                        {!isExport && (
                            <div className="flex gap-2">
                                <button onClick={() => {
                                    setFormData({
                                        nomeBloco: blocoNome,
                                        dataContagem: reg.dataContagem,
                                        perdaPlantio: reg.perdaPlantio,
                                        perdaContagemA: reg.perdaA,
                                        perdaContagemB: reg.perdaB,
                                        transplantadoA: reg.somaAreaA,
                                        transplantadoB: reg.somaAreaB,
                                        variedadesList: reg.variedades.map(v => ({...v}))
                                    });
                                    setEditingRef({ blocoNome, regId: reg.id });
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }} className="p-3 text-slate-400 hover:text-orange-500 rounded-xl transition-all"><SvgIcon name="edit" className="w-5 h-5"/></button>
                                <button onClick={() => saveToLocal(blocosData.map(b => b.nome === blocoNome ? {...b, registros: b.registros.filter(r => r.id !== reg.id)} : b).filter(b => b.registros.length > 0))} className="p-3 text-slate-400 hover:text-red-500 rounded-xl transition-all"><SvgIcon name="trash" className="w-5 h-5"/></button>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-[#062C1B] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={NEW_LOGO_URL} className="h-10" />
                                <div>
                                    <h1 className="font-black uppercase text-lg leading-none tracking-tight">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest leading-none mt-1">Mortalidade de Plantio</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={downloadJpeg} title="Exportar Imagem Vertical (WhatsApp)" className="bg-emerald-600 p-3 rounded-2xl hover:bg-emerald-700 shadow-lg active:scale-95 transition-all">
                                    <SvgIcon name="download" className="w-5 h-5" />
                                </button>
                                <button onClick={downloadPdf} title="Exportar PDF A4 (Impressão)" className="bg-red-600 p-3 rounded-2xl hover:bg-red-700 shadow-lg active:scale-95 transition-all">
                                    <SvgIcon name="pdf" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[460px_1fr] gap-8">
                        <section className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                                <h2 className="text-[11px] font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                                    <SvgIcon name="leaf" className="text-emerald-600 w-4 h-4" />
                                    {editingRef ? 'Editando Registro' : 'Lançamento de Dados'}
                                </h2>
                                <form onSubmit={handleSave} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Bloco</label>
                                            <select value={formData.nomeBloco} onChange={e => setFormData({...formData, nomeBloco: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-black outline-none">
                                                {LISTA_BLOCOS_PADRAO.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Data da Contagem</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-black text-emerald-700 uppercase tracking-widest px-1">Variedades</p>
                                        {formData.variedadesList.map((v) => (
                                            <div key={v.id} className="p-4 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                                                <div className="flex justify-between items-center">
                                                    <select value={v.nome} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, nome: e.target.value} : item)})} className="bg-transparent text-xs font-black uppercase outline-none text-emerald-900">
                                                        {LISTA_VARIEDADES.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                    {formData.variedadesList.length > 1 && (
                                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: formData.variedadesList.filter(item => item.id !== v.id)})} className="text-red-400 p-1 hover:bg-red-50 rounded-lg transition-colors"><SvgIcon name="trash" className="w-4 h-4"/></button>
                                                    )}
                                                </div>
                                                
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div>
                                                        <p className="text-[7px] font-black text-slate-400 uppercase mb-1 text-center">Banj.</p>
                                                        <input type="number" value={v.bandejas} onChange={e => handleBandejasChange(v.id, e.target.value)} className="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-center outline-none" placeholder="0" />
                                                    </div>
                                                    <div>
                                                        <p className="text-[7px] font-black text-slate-400 uppercase mb-1 text-center">Mudas</p>
                                                        <div className="w-full p-2 bg-blue-50 text-blue-700 border border-blue-100 rounded-xl text-[10px] font-black text-center h-[34px] flex items-center justify-center">{v.totalMudas || '0'}</div>
                                                    </div>
                                                    <div>
                                                        <p className="text-[7px] font-black text-emerald-600 uppercase mb-1 text-center">Plantado</p>
                                                        <input type="number" value={v.transplantadoVariedade} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, transplantadoVariedade: e.target.value} : item)})} className="w-full p-2 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl text-xs font-black text-center outline-none" placeholder="0" />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: [...formData.variedadesList, { id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '' }]})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-[9px] font-black text-slate-400 uppercase hover:bg-emerald-50 transition-all">+ Variedade</button>
                                    </div>

                                    <div className="bg-emerald-900/5 p-4 rounded-[2rem] border border-emerald-100 space-y-3">
                                        <p className="text-[8px] font-black text-emerald-800 uppercase text-center tracking-widest leading-tight">Divisão por Áreas do Bloco</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="text-center">
                                                <p className="text-[7px] font-black text-slate-400 uppercase mb-1">Lado A</p>
                                                <input type="number" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black text-center outline-none" placeholder="0" />
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[7px] font-black text-slate-400 uppercase mb-1">Lado B</p>
                                                <input type="number" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black text-center outline-none" placeholder="0" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-lg">
                                        <div className="flex justify-between items-center mb-1">
                                            <p className="text-[9px] font-black uppercase text-emerald-400 tracking-widest">Plantado Efetivo</p>
                                            <SvgIcon name="target" className="w-4 h-4 text-emerald-400" />
                                        </div>
                                        <p className="text-3xl font-black">{calcGeral.transplantadoTotalBloco.toLocaleString()} <span className="text-xs font-normal text-emerald-300">un</span></p>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                                            <label className="text-[9px] font-black text-orange-700 uppercase mb-2 block">Perda no Plantio (Mudas)</label>
                                            <input type="number" value={formData.perdaPlantio} onChange={e => setFormData({...formData, perdaPlantio: e.target.value})} className="w-full p-3 bg-white border border-orange-200 rounded-2xl text-xs font-black outline-none" placeholder="Quantas mudas sobraram?" />
                                        </div>

                                        <div className="bg-red-50 p-4 rounded-3xl border border-red-100">
                                            <label className="text-[9px] font-black text-red-700 uppercase mb-2 block text-center">Mortas no Campo (Contagem)</label>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="number" value={formData.perdaContagemA} onChange={e => setFormData({...formData, perdaContagemA: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Lado A" />
                                                <input type="number" value={formData.perdaContagemB} onChange={e => setFormData({...formData, perdaContagemB: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Lado B" />
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full py-4 bg-[#062C1B] text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl hover:bg-emerald-950 active:scale-95 transition-all">
                                        {editingRef ? "Atualizar" : "Salvar Registro"}
                                    </button>
                                </form>
                            </div>
                        </section>

                        <section className="space-y-6">
                            {blocosData.length === 0 ? (
                                <div className="p-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 text-slate-300 font-black uppercase text-xs">Aguardando Lançamentos</div>
                            ) : (
                                [...blocosData].reverse().map(bloco => (
                                    <div key={bloco.id} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-md overflow-hidden">
                                        <div className="bg-[#062C1B] p-5 text-white px-8 flex justify-between items-center">
                                            <h3 className="font-black text-base uppercase tracking-widest flex items-center gap-2">
                                                <span className="w-2 h-6 bg-emerald-400 rounded-full"></span>
                                                {bloco.nome}
                                            </h3>
                                            <p className="text-[10px] font-bold uppercase text-emerald-400">{bloco.registros.length} Registro(s)</p>
                                        </div>
                                        <div className="p-6 space-y-8">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* TEMPLATE DE EXPORTAÇÃO VERTICAL OTIMIZADO */}
                    {showExportTemplate && (
                        <div id="export-container">
                            <div className="bg-white rounded-[3rem] p-8 shadow-sm border border-slate-200">
                                <div className="text-center mb-10 border-b-2 border-emerald-900/10 pb-8">
                                    <img src={NEW_LOGO_URL} className="h-16 mx-auto mb-4" crossOrigin="anonymous" />
                                    <h1 className="font-black uppercase text-2xl text-[#062C1B] leading-none mb-2">Relatório de Mortalidade</h1>
                                    <p className="text-xs text-emerald-600 font-bold uppercase tracking-[0.2em]">Fazenda Oásis</p>
                                </div>
                                
                                <div className="space-y-8">
                                    {blocosData.map(bloco => (
                                        <div key={bloco.id} className="space-y-6">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} isExport={true} />
                                            ))}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-10 pt-6 border-t-2 border-slate-100 text-center">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Sistema de Gestão Fazenda Oásis • {new Date().toLocaleDateString('pt-PT')}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
