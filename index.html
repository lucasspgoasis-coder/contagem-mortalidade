<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #FFFFFF;
            width: 800px; 
            padding: 20px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .pct-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            line-height: 1;
            padding: 4px 10px;
            font-weight: 800;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";
        const BLOCOS_OPCOES = Array.from({ length: 14 }, (_, i) => `Bloco ${String(i + 1).padStart(2, '0')}`);
        const VARIEDADES_OPCOES = ["Master TSV", "Syngenta BRO", "Pharlap", "Jiraya"];

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1.2 0-2.31-.3-3.27-.83M11 20l-2-2"/>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const getToday = () => new Date().toISOString().split('T')[0];
            const calculateFutureDate = (baseDate, days) => {
                if (!baseDate) return "";
                const date = new Date(baseDate + 'T12:00:00');
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            };

            const [perdasVariedade, setPerdasVariedade] = useState([]);
            const [varForm, setVarForm] = useState({ nome: '', customNome: '', qtd: '', lado: 'A' });

            const [formData, setFormData] = useState({
                dataContagem: getToday(),
                proximaContagem: calculateFutureDate(getToday(), 15),
                blocoTalhao: '',
                blocoCustom: '',
                totalBandejas: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v10');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v10', JSON.stringify(data));
                setRegistros(data);
            };

            const perdasCalculadas = useMemo(() => {
                const somaA = perdasVariedade.filter(p => p.lado === 'A').reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                const somaB = perdasVariedade.filter(p => p.lado === 'B').reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                return { somaA, somaB, total: somaA + somaB };
            }, [perdasVariedade]);

            const calculosGerais = useMemo(() => {
                const totalM = (Number(formData.totalBandejas) || 0) * 200;
                const totalPLote = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const totalTrans = transA + transB;
                const totalPPos = perdasCalculadas.total;
                const percPerdaLote = totalM > 0 ? Math.round((totalPLote / totalM) * 100) : 0;
                const percPos = totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0;
                
                return {
                    totalMudas: totalM,
                    percPerdaLote,
                    percPos,
                    totalTrans,
                    totalPPos,
                    perdaAcumulada: totalPLote + totalPPos,
                    percGeral: percPerdaLote + percPos,
                    pPosA: perdasCalculadas.somaA,
                    pPosB: perdasCalculadas.somaB
                };
            }, [formData, perdasCalculadas]);

            const handleAddVariedade = () => {
                const nomeFinal = varForm.nome === "Outro" ? varForm.customNome : varForm.nome;
                if (!nomeFinal || !varForm.qtd) return;
                setPerdasVariedade([...perdasVariedade, { nome: nomeFinal, qtd: varForm.qtd, lado: varForm.lado, id: Date.now() }]);
                setVarForm({ ...varForm, nome: '', customNome: '', qtd: '' });
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const blocoFinal = formData.blocoTalhao === "Outro" ? formData.blocoCustom : formData.blocoTalhao;
                const novo = {
                    ...formData,
                    blocoTalhao: blocoFinal,
                    id: Date.now(),
                    perdasDetalhadas: perdasVariedade,
                    ...calculosGerais
                };
                save([novo, ...registros]);
                setPerdasVariedade([]);
                setFormData({ dataContagem: getToday(), proximaContagem: calculateFutureDate(getToday(), 15), blocoTalhao: '', blocoCustom: '', totalBandejas: '', transplantadoA: '', transplantadoB: '', totalPerdasLote: '' });
            };

            const exportPDF = async () => {
                if (registros.length === 0) return;
                setShowExport(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(reportRef.current, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    // Lógica para múltiplas páginas se o histórico for muito longo
                    let heightLeft = pdfHeight;
                    let position = 0;
                    const pageHeight = pdf.internal.pageSize.getHeight();

                    pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pageHeight;

                    while (heightLeft >= 0) {
                        position = heightLeft - pdfHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, pdfHeight);
                        heightLeft -= pageHeight;
                    }

                    pdf.save(`OASIS_HISTORICO_${new Date().getTime()}.pdf`);
                    setShowExport(false);
                }, 800);
            };

            return (
                <div className="min-h-screen pb-12 text-slate-900">
                    <header className="bg-[#062C1B] text-white p-4 shadow-xl sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-10" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tighter leading-none">Fazenda Oásis</h1>
                                    <p className="text-[9px] text-emerald-400 font-bold uppercase tracking-widest mt-1">Histórico de Campo</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportPDF} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                    <SvgIcon name="printer" /> Baixar Histórico PDF
                                </button>
                                <button onClick={() => { if(confirm("Limpar todo o histórico?")) save([]); }} className="bg-white/10 hover:bg-red-600 text-white p-2 rounded-lg transition-all">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 grid lg:grid-cols-[360px_1fr] gap-6 mt-2">
                        {/* FORMULÁRIO */}
                        <aside className="space-y-4">
                            <div className="bg-white p-6 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-[10px] font-black text-slate-900 uppercase mb-5 flex items-center gap-2">
                                    <div className="p-1.5 bg-emerald-100 rounded-lg text-emerald-700"><SvgIcon name="plus" className="w-3.5 h-3.5"/></div>
                                    Nova Entrada
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                                            <label className="text-[8px] font-black text-slate-400 uppercase block mb-1">Data</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full bg-transparent text-[11px] font-bold outline-none" required />
                                        </div>
                                        <div className="bg-emerald-50 p-2.5 rounded-xl border border-emerald-100">
                                            <label className="text-[8px] font-black text-emerald-600 uppercase block mb-1">Próxima Visita</label>
                                            <div className="text-[11px] font-black text-emerald-700">
                                                {formData.proximaContagem ? formData.proximaContagem.split('-').reverse().join('/') : "--/--/--"}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 space-y-2">
                                        <label className="text-[8px] font-black text-slate-400 uppercase block">Local (Bloco / Talhão)</label>
                                        <select value={formData.blocoTalhao} onChange={e => setFormData({...formData, blocoTalhao: e.target.value})} className="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" required>
                                            <option value="">Selecione...</option>
                                            {BLOCOS_OPCOES.map(b => <option key={b} value={b}>{b}</option>)}
                                            <option value="Outro">Outro (Manual)</option>
                                        </select>
                                        {formData.blocoTalhao === "Outro" && (
                                            <input type="text" placeholder="Local Manual" value={formData.blocoCustom} onChange={e => setFormData({...formData, blocoCustom: e.target.value})} className="w-full p-2 bg-white border border-emerald-300 rounded-xl text-xs font-bold outline-none" required />
                                        )}
                                    </div>

                                    {/* DETALHAMENTO VARIADADE */}
                                    <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-3">
                                        <div className="text-[8px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-1.5"><SvgIcon name="leaf" className="w-3 h-3" /> Adicionar Perda Pós</div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select value={varForm.nome} onChange={e => setVarForm({...varForm, nome: e.target.value})} className="p-2 bg-white border border-indigo-200 rounded-xl text-[10px] font-bold outline-none">
                                                <option value="">Variedade</option>
                                                {VARIEDADES_OPCOES.map(v => <option key={v} value={v}>{v}</option>)}
                                                <option value="Outro">Outra</option>
                                            </select>
                                            <input type="number" placeholder="Qtd" value={varForm.qtd} onChange={e => setVarForm({...varForm, qtd: e.target.value})} className="p-2 bg-white border border-indigo-200 rounded-xl text-[10px] font-bold outline-none"/>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex-1 flex bg-white border border-indigo-200 rounded-xl overflow-hidden p-1">
                                                <button type="button" onClick={() => setVarForm({...varForm, lado: 'A'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg ${varForm.lado === 'A' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>SETOR A</button>
                                                <button type="button" onClick={() => setVarForm({...varForm, lado: 'B'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg ${varForm.lado === 'B' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>SETOR B</button>
                                            </div>
                                            <button type="button" onClick={handleAddVariedade} className="bg-indigo-600 text-white px-3 rounded-xl"><SvgIcon name="plus" /></button>
                                        </div>
                                        {perdasVariedade.length > 0 && (
                                            <div className="max-h-24 overflow-y-auto custom-scroll space-y-1">
                                                {perdasVariedade.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center bg-white p-1.5 px-3 rounded-xl border border-indigo-100 text-[9px] font-bold">
                                                        <span className="text-indigo-900">{p.nome} (S{p.lado})</span>
                                                        <div className="flex items-center gap-2">
                                                            <span>{p.qtd} un</span>
                                                            <button type="button" onClick={() => setPerdasVariedade(perdasVariedade.filter(x => x.id !== p.id))} className="text-red-400"><SvgIcon name="trash" className="w-3 h-3" /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-900 p-3 rounded-2xl text-center">
                                            <label className="text-[8px] font-black text-slate-500 uppercase block mb-1">Bandejas</label>
                                            <input type="number" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white text-center text-xl font-black outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-3 rounded-2xl text-center flex flex-col justify-center">
                                            <label className="text-[8px] font-black text-emerald-400 uppercase block mb-1">Total Mudas</label>
                                            <div className="text-white text-lg font-black leading-none">{formatNumber(calculosGerais.totalMudas)}</div>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-emerald-50 rounded-2xl border border-emerald-200">
                                        <label className="text-[8px] font-black text-emerald-700 uppercase block mb-2">Transplantado (Mudas)</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" placeholder="Setor A" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="p-2 bg-white rounded-xl text-center text-xs font-black border border-emerald-100 outline-none" required />
                                            <input type="number" placeholder="Setor B" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="p-2 bg-white rounded-xl text-center text-xs font-black border border-emerald-100 outline-none" required />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-3 rounded-2xl border border-orange-200">
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[8px] font-black text-orange-700 uppercase">Perda Transplantio</label>
                                            <span className="pct-badge bg-orange-200 text-orange-800 text-[10px]">{calculosGerais.percPerdaLote}%</span>
                                        </div>
                                        <input type="number" placeholder="0" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-xl text-center font-black text-orange-950 outline-none" required />
                                    </div>

                                    <div className="bg-red-50 p-3 rounded-2xl border border-red-200 flex justify-between items-center">
                                        <div>
                                            <label className="text-[8px] font-black text-red-700 uppercase">Perda Pós (Auto)</label>
                                            <p className="text-xl font-black text-red-950">{formatNumber(calculosGerais.totalPPos)}</p>
                                        </div>
                                        <span className="pct-badge bg-red-200 text-red-800 text-[10px]">{calculosGerais.percPos}%</span>
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2">
                                        <SvgIcon name="check" /> Salvar Registro
                                    </button>
                                </form>
                            </div>
                        </aside>

                        {/* LISTAGEM PRINCIPAL */}
                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="bg-white p-12 rounded-[2rem] border border-slate-100 text-center text-slate-300 font-bold uppercase text-[10px]">Sem registros</div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[1.5rem] p-5 card-shadow border border-slate-100 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-1.5 h-full bg-emerald-600"></div>
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Monitoramento</p>
                                                <p className="text-base font-black text-slate-900">{reg.blocoTalhao} — {reg.dataContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-slate-200 hover:text-red-500"><SvgIcon name="trash" /></button>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                                                <p className="text-[7px] font-black text-slate-400 uppercase mb-1">Iniciais</p>
                                                <p className="text-lg font-black">{formatNumber(reg.totalMudas)}</p>
                                            </div>
                                            <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100 text-center">
                                                <p className="text-[7px] font-black text-emerald-600 uppercase mb-1">Transplantado</p>
                                                <p className="text-lg font-black text-emerald-950">{formatNumber(reg.totalTrans)}</p>
                                            </div>
                                            <div className="bg-orange-50 p-3 rounded-xl border border-orange-100 text-center">
                                                <p className="text-[7px] font-black text-orange-600 uppercase mb-1">P. Transpl.</p>
                                                <p className="text-lg font-black text-orange-950">{reg.percPerdaLote}%</p>
                                            </div>
                                            <div className="bg-red-50 p-3 rounded-xl border border-red-100 text-center">
                                                <p className="text-[7px] font-black text-red-600 uppercase mb-1">P. Pós</p>
                                                <p className="text-lg font-black text-red-950">{reg.percPos}%</p>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* PDF CONTAINER (OCULTO - USADO APENAS PARA EXPORTAR) */}
                    {showExport && (
                        <div id="export-container" ref={reportRef}>
                            <div className="border-b-4 border-[#062C1B] pb-6 mb-8 flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-14" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="text-2xl font-black text-[#062C1B] uppercase leading-none">Relatório Consolidado</h1>
                                        <p className="text-[8px] font-bold text-emerald-600 uppercase tracking-widest mt-1">Fazenda Oásis — Gestão de Perdas</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-black text-slate-400 uppercase">Emissão: {new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>

                            <div className="space-y-6">
                                {registros.map((reg, idx) => (
                                    <div key={reg.id} className="border border-slate-200 p-6 rounded-3xl bg-white break-inside-avoid">
                                        <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                            <div>
                                                <h3 className="text-lg font-black text-slate-900">{reg.blocoTalhao}</h3>
                                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Data: {reg.dataContagem.split('-').reverse().join('/')} | Próxima: {reg.proximaContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <div className="bg-[#062C1B] text-white px-5 py-2 rounded-xl text-center">
                                                <p className="text-[8px] font-black uppercase text-emerald-400">Perda Total</p>
                                                <p className="text-xl font-black">{reg.percGeral}%</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-4 gap-4 mb-6">
                                            <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-slate-400 uppercase mb-2">Mudas Iniciais</p>
                                                <p className="text-lg font-black text-slate-900">{formatNumber(reg.totalMudas)}</p>
                                            </div>
                                            <div className="bg-emerald-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-emerald-600 uppercase mb-2">Transplantado</p>
                                                <p className="text-lg font-black text-emerald-950">{formatNumber(reg.totalTrans)}</p>
                                            </div>
                                            <div className="bg-orange-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-orange-600 uppercase mb-2">Perda Trans.</p>
                                                <p className="text-lg font-black text-orange-950">{formatNumber(reg.totalPerdasLote)} <span className="text-[9px]">({reg.percPerdaLote}%)</span></p>
                                            </div>
                                            <div className="bg-red-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-red-600 uppercase mb-2">Perda Pós</p>
                                                <p className="text-lg font-black text-red-950">{formatNumber(reg.totalPPos)} <span className="text-[9px]">({reg.percPos}%)</span></p>
                                            </div>
                                        </div>

                                        {reg.perdasDetalhadas && reg.perdasDetalhadas.length > 0 && (
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">Detalhamento das Variedades</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {reg.perdasDetalhadas.map((p, pIdx) => (
                                                        <div key={pIdx} className="bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold">
                                                            <span className="text-slate-900 uppercase">{p.nome}</span>
                                                            <span className="ml-2 text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded">Setor {p.lado}: {p.qtd} un</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="mt-10 pt-6 border-t border-slate-200 text-center text-slate-300 font-bold uppercase tracking-widest text-[8px]">
                                Fim do Relatório Histórico — Oásis Inteligência Agrícola
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
