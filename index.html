<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F1F5F9;
        }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #F8FAFC;
            width: 1000px;
            padding: 40px;
        }
        .progress-bar { height: 8px; border-radius: 4px; background: #E2E8F0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const SvgIcon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
                fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const getFutureDate = (days) => {
                const d = new Date();
                d.setDate(d.getDate() + days);
                return d.toISOString().split('T')[0];
            };

            const initialForm = {
                dataContagem: new Date().toISOString().split('T')[0],
                proximaContagem: getFutureDate(15),
                totalBandejas: '',
                linhasA: '',
                linhasB: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: '',
                perdaPosA: '',
                perdaPosB: ''
            };

            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v3');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v3', JSON.stringify(data));
                setRegistros(data);
            };

            const calculos = useMemo(() => {
                const totalM = (Number(formData.totalBandejas) || 0) * 200;
                const totalPLote = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const pPosA = Number(formData.perdaPosA) || 0;
                const pPosB = Number(formData.perdaPosB) || 0;

                const totalTrans = transA + transB;
                const totalPPos = pPosA + pPosB;

                return {
                    totalMudas: totalM,
                    percPerdaLote: totalM > 0 ? Math.round((totalPLote / totalM) * 100) : 0,
                    percPos: totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0,
                    totalTrans,
                    totalPPos
                };
            }, [formData]);

            const handleAdd = (e) => {
                e.preventDefault();
                const novo = {
                    ...formData,
                    id: Date.now(),
                    totalMudas: calculos.totalMudas,
                    percPerdaLote: calculos.percPerdaLote,
                    percPos: calculos.percPos,
                    totalTransplantado: calculos.totalTrans,
                    totalPerdasPos: calculos.totalPPos
                };
                save([novo, ...registros]);
                setFormData({...initialForm, dataContagem: new Date().toISOString().split('T')[0], proximaContagem: getFutureDate(15)});
            };

            const exportImage = async () => {
                setShowExport(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(reportRef.current, { 
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#F8FAFC'
                    });
                    const link = document.createElement('a');
                    link.download = `RELATORIO_OASIS_${new Date().getTime()}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                    setShowExport(false);
                }, 600);
            };

            return (
                <div className="min-h-screen pb-12 text-slate-900">
                    <header className="bg-[#062C1B] text-white p-6 shadow-xl sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-12" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Gestão de Perdas</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportImage} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                    <SvgIcon name="fileText" /> Gerar Dashboard Profissional
                                </button>
                                <button onClick={() => { if(confirm("Zerar todos os registros?")) save([]); }} className="bg-white/10 hover:bg-red-600 text-white p-2.5 rounded-xl transition-all">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[400px_1fr] gap-8 mt-4">
                        <aside>
                            <div className="bg-white p-6 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-sm font-black text-slate-900 uppercase mb-6 flex items-center gap-2">
                                    <div className="p-2 bg-emerald-100 rounded-lg"><SvgIcon name="trendingDown" className="text-emerald-700 w-4 h-4"/></div>
                                    Registro de Dados
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1 block mb-1">Data Referência</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:ring-2 focus:ring-emerald-500 outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-emerald-600 uppercase ml-1 block mb-1">Próxima Visita</label>
                                            <input type="date" value={formData.proximaContagem} className="w-full p-3 bg-emerald-50 border border-emerald-100 rounded-xl text-xs font-bold text-emerald-700 outline-none" readOnly />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="col-span-2 text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1 flex items-center gap-1">
                                            <SvgIcon name="grid" className="w-2.5 h-2.5" /> Estrutura do Canteiro
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-500 uppercase ml-1 block mb-1">Linhas Canteiro A</label>
                                            <input type="number" placeholder="0" value={formData.linhasA} onChange={e => setFormData({...formData, linhasA: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-500 uppercase ml-1 block mb-1">Linhas Canteiro B</label>
                                            <input type="number" placeholder="0" value={formData.linhasB} onChange={e => setFormData({...formData, linhasB: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-900 p-4 rounded-2xl shadow-inner text-center">
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Qtde Bandejas</label>
                                            <input type="number" placeholder="0" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white text-center border-none text-2xl font-black focus:ring-0 outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-4 rounded-2xl shadow-inner flex flex-col items-center justify-center">
                                            <label className="text-[9px] font-black text-emerald-400 uppercase block mb-1">Total Mudas</label>
                                            <div className="text-white text-2xl font-black">{formatNumber(calculos.totalMudas)}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 text-center">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Transp. Lado A</label>
                                            <input type="number" placeholder="0" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full bg-transparent text-center text-lg font-black outline-none" />
                                        </div>
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 text-center">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Transp. Lado B</label>
                                            <input type="number" placeholder="0" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full bg-transparent text-center text-lg font-black outline-none" />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                                        <div className="flex justify-between items-center mb-1 px-1">
                                            <label className="text-[9px] font-black text-orange-700 uppercase">Perdas Transplantio</label>
                                            <span className="text-[10px] font-black text-orange-800 bg-orange-200 px-2 py-0.5 rounded-full">{calculos.percPerdaLote}%</span>
                                        </div>
                                        <input type="number" placeholder="0" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-2xl text-center font-black text-orange-900 outline-none" required />
                                    </div>

                                    <div className="bg-red-50 p-5 rounded-2xl border border-red-200 space-y-4">
                                        <div className="flex justify-between items-center border-b border-red-200 pb-2">
                                            <label className="text-[9px] font-black text-red-700 uppercase">Perdas Pós-Transp.</label>
                                            <div className="text-right">
                                                <p className="text-[8px] text-red-400 uppercase font-black">Soma: {calculos.totalPPos}</p>
                                                <p className="text-xs font-black text-red-800">{calculos.percPos}% Geral</p>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[8px] font-bold text-red-500 uppercase block text-center">Lado A</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosA} onChange={e => setFormData({...formData, perdaPosA: e.target.value})} className="w-full bg-transparent text-center text-lg font-black text-red-900 outline-none" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-bold text-red-500 uppercase block text-center">Lado B</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosB} onChange={e => setFormData({...formData, perdaPosB: e.target.value})} className="w-full bg-transparent text-center text-lg font-black text-red-900 outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                                        <SvgIcon name="check" /> Salvar no Histórico
                                    </button>
                                </form>
                            </div>
                        </aside>

                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="bg-white p-20 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                                    <p className="text-slate-400 font-bold uppercase text-xs tracking-widest">Aguardando registros para exibição...</p>
                                </div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[2rem] p-6 card-shadow border border-slate-200 flex flex-col gap-6 relative group transition-all hover:border-emerald-200">
                                        <div className="absolute top-0 left-0 w-2 h-full bg-emerald-600 rounded-l-full"></div>
                                        
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-slate-100 p-2.5 rounded-xl"><SvgIcon name="calendar" className="text-slate-600 w-5 h-5"/></div>
                                                <div>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter leading-none mb-1">Data do Registro</p>
                                                    <p className="text-base font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-2">
                                                <div className="px-3 py-1.5 bg-slate-900 rounded-lg text-center border border-white/10 min-w-[70px]">
                                                    <span className="text-[7px] font-black text-slate-500 uppercase block">Canteiro A</span>
                                                    <span className="text-xs font-black text-white">{reg.linhasA || '--'} L</span>
                                                </div>
                                                <div className="px-3 py-1.5 bg-slate-900 rounded-lg text-center border border-white/10 min-w-[70px]">
                                                    <span className="text-[7px] font-black text-slate-500 uppercase block">Canteiro B</span>
                                                    <span className="text-xs font-black text-white">{reg.linhasB || '--'} L</span>
                                                </div>
                                            </div>

                                            <div className="px-4 py-2 bg-emerald-50 rounded-xl border border-emerald-100 flex flex-col items-end">
                                                <p className="text-[8px] font-black text-emerald-500 uppercase">Próxima Contagem</p>
                                                <p className="text-sm font-black text-emerald-800">{reg.proximaContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-slate-300 hover:text-red-500 transition-colors p-2">
                                                <SvgIcon name="trash" className="w-5 h-5" />
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">Mudas em Lote</p>
                                                <p className="text-xl font-black text-slate-800">{formatNumber(reg.totalMudas)}</p>
                                                <p className="text-[9px] font-bold text-slate-400 mt-1">{reg.totalBandejas} Bandejas</p>
                                            </div>
                                            
                                            <div className="bg-emerald-900 p-4 rounded-2xl text-white shadow-lg shadow-emerald-900/10">
                                                <div className="flex justify-between items-start mb-2">
                                                    <p className="text-[8px] font-black text-emerald-400 uppercase tracking-widest">Transplantados</p>
                                                    <span className="bg-emerald-600 text-[8px] px-1.5 py-0.5 rounded font-black">TOTAL: {formatNumber(reg.totalTransplantado)}</span>
                                                </div>
                                                <div className="flex justify-between gap-4 border-t border-emerald-800 pt-3">
                                                    <div>
                                                        <p className="text-[7px] font-black text-emerald-500 uppercase mb-0.5">Lado A</p>
                                                        <p className="text-lg font-black leading-none">{formatNumber(reg.transplantadoA)}</p>
                                                    </div>
                                                    <div className="w-px h-6 bg-emerald-800 self-end"></div>
                                                    <div className="text-right">
                                                        <p className="text-[7px] font-black text-emerald-500 uppercase mb-0.5">Lado B</p>
                                                        <p className="text-lg font-black leading-none">{formatNumber(reg.transplantadoB)}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100 flex flex-col justify-center">
                                                <p className="text-[9px] font-bold text-orange-600 uppercase mb-1 flex justify-between">Perda Transp. <span className="text-orange-400">{reg.percPerdaLote}%</span></p>
                                                <p className="text-xl font-black text-orange-700 leading-none">{formatNumber(reg.totalPerdasLote)}</p>
                                            </div>

                                            <div className="bg-red-50 p-4 rounded-2xl border border-red-100 flex flex-col justify-center">
                                                <p className="text-[9px] font-bold text-red-600 uppercase mb-1 flex justify-between">Perda Pós <span className="text-red-400">{reg.percPos}%</span></p>
                                                <p className="text-xl font-black text-red-700 leading-none">{formatNumber(reg.totalPerdasPos)}</p>
                                                <p className="text-[8px] font-bold text-red-300 mt-1 uppercase tracking-tighter">A:{reg.perdaPosA} | B:{reg.perdaPosB}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {showExport && (
                        <div id="export-container" ref={reportRef}>
                            <div className="flex justify-between items-center border-b-4 border-[#062C1B] pb-8 mb-10">
                                <div className="flex items-center gap-10">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-28" crossOrigin="anonymous" />
                                    <div className="h-20 w-px bg-slate-200"></div>
                                    <div>
                                        <h1 className="text-5xl font-black text-[#062C1B] uppercase tracking-tighter leading-none">Dashboard de Controle</h1>
                                        <p className="text-lg font-bold text-emerald-600 uppercase tracking-[0.3em] mt-3">Unidade de Gestão de Perdas e Eficiência</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest">Emissão</p>
                                    <p className="text-2xl font-black text-slate-900">{new Date().toLocaleDateString('pt-BR')}</p>
                                    <div className="mt-2 inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                                        <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Relatório Oficial
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-12">
                                {registros.slice(0, 3).map((reg, idx) => {
                                    const eficiencia = 100 - reg.percPerdaLote - reg.percPos;
                                    return (
                                        <div key={reg.id} className="relative bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm overflow-hidden">
                                            <div className="absolute top-[-20px] right-[-10px] text-[120px] font-black text-slate-50 opacity-10 pointer-events-none italic">
                                                #{registros.length - idx}
                                            </div>

                                            <div className="flex justify-between items-start mb-10">
                                                <div>
                                                    <h2 className="text-[10px] font-black text-emerald-600 uppercase tracking-[0.5em] mb-2">Período de Referência</h2>
                                                    <p className="text-4xl font-black text-slate-900 tracking-tight">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                                <div className="flex gap-4">
                                                    <div className="text-center bg-slate-100 px-6 py-4 rounded-2xl min-w-[120px]">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Canteiro A</p>
                                                        <p className="text-2xl font-black text-slate-800">{reg.linhasA || '--'}</p>
                                                        <p className="text-[7px] font-bold text-slate-400 uppercase tracking-widest leading-none">LINHAS</p>
                                                    </div>
                                                    <div className="text-center bg-slate-100 px-6 py-4 rounded-2xl min-w-[120px]">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Canteiro B</p>
                                                        <p className="text-2xl font-black text-slate-800">{reg.linhasB || '--'}</p>
                                                        <p className="text-[7px] font-bold text-slate-400 uppercase tracking-widest leading-none">LINHAS</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-4 gap-6 mb-12">
                                                <div className="bg-slate-900 rounded-3xl p-6 text-white text-center">
                                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Volume Mudas</p>
                                                    <p className="text-3xl font-black leading-none">{formatNumber(reg.totalMudas)}</p>
                                                    <p className="text-[9px] font-bold text-slate-500 mt-2 uppercase">{reg.totalBandejas} BANDEJAS</p>
                                                </div>
                                                <div className="bg-emerald-50 rounded-3xl p-6 border-2 border-emerald-100 text-center">
                                                    <p className="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-2">Transplantados</p>
                                                    <p className="text-3xl font-black text-emerald-900 leading-none">{formatNumber(reg.totalTransplantado)}</p>
                                                    <p className="text-[9px] font-bold text-emerald-400 mt-2 uppercase tracking-tighter">EFICIÊNCIA: {eficiencia}%</p>
                                                </div>
                                                <div className="bg-orange-50 rounded-3xl p-6 border-2 border-orange-100 text-center">
                                                    <p className="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-2">Perda Transp.</p>
                                                    <p className="text-3xl font-black text-orange-900 leading-none">{formatNumber(reg.totalPerdasLote)}</p>
                                                    <div className="inline-flex mt-2 px-3 py-1 bg-orange-200 text-orange-800 rounded-full text-xs font-black">{reg.percPerdaLote}%</div>
                                                </div>
                                                <div className="bg-red-50 rounded-3xl p-6 border-2 border-red-100 text-center">
                                                    <p className="text-[9px] font-black text-red-500 uppercase tracking-widest mb-2">Perda Pós-T.</p>
                                                    <p className="text-3xl font-black text-red-900 leading-none">{formatNumber(reg.totalPerdasPos)}</p>
                                                    <div className="inline-flex mt-2 px-3 py-1 bg-red-200 text-red-800 rounded-full text-xs font-black">{reg.percPos}%</div>
                                                </div>
                                            </div>

                                            <div className="mb-10 p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">Gráfico de Aproveitamento Operacional</h3>
                                                    <span className="text-xs font-black text-emerald-600">{eficiencia}% Aproveitado</span>
                                                </div>
                                                <div className="progress-bar w-full">
                                                    <div className="progress-fill bg-emerald-500" style={{ width: `${eficiencia}%` }}></div>
                                                </div>
                                                <div className="flex justify-between mt-3">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-3 h-3 rounded bg-emerald-500"></div>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Mudas Vivas</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-3 h-3 rounded bg-orange-400"></div>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Perda Transp.</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-3 h-3 rounded bg-red-400"></div>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">Perda Pós</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex gap-10">
                                                <div className="flex-1 flex items-center justify-between p-5 bg-white border border-slate-100 rounded-2xl">
                                                    <span className="text-[9px] font-black text-slate-300 uppercase italic">Detalhe Transplantes</span>
                                                    <div className="flex gap-10">
                                                        <p className="text-sm font-black text-slate-400">LADO A: <span className="text-slate-900">{formatNumber(reg.transplantadoA)}</span></p>
                                                        <p className="text-sm font-black text-slate-400">LADO B: <span className="text-slate-900">{formatNumber(reg.transplantadoB)}</span></p>
                                                    </div>
                                                </div>
                                                <div className="w-[300px] flex items-center justify-center p-5 bg-emerald-900 text-white rounded-2xl">
                                                    <p className="text-[9px] font-black uppercase tracking-widest">Próxima Verificação Técnica: <span className="text-emerald-300 ml-2">{reg.proximaContagem.split('-').reverse().join('/')}</span></p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}

                                <div className="mt-20 pt-10 border-t-2 border-dashed border-slate-200 flex justify-between items-end">
                                    <div className="max-w-[300px] space-y-4">
                                        <p className="text-[9px] font-bold text-slate-400 uppercase leading-relaxed italic">
                                            Este documento contém informações consolidadas da produção da Fazenda Oásis e deve ser utilizado para fins de planejamento e análise técnica.
                                        </p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-full border-2 border-emerald-600 flex items-center justify-center text-emerald-600 font-black text-[8px] text-center p-1 leading-none uppercase">
                                                Qualidade Oásis
                                            </div>
                                            <p className="text-[7px] text-slate-300 font-bold uppercase tracking-widest leading-tight">
                                                FAZENDA OÁSIS LTDA<br/>
                                                GESTÃO DE PRODUÇÃO AGRÍCOLA
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-center">
                                        <div className="w-[250px] border-b border-slate-900 mb-2"></div>
                                        <p className="text-[10px] font-black text-slate-900 uppercase tracking-widest">Responsável Técnico / Produção</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
