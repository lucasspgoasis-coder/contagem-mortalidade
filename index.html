<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Registro de Mortalidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #F8FAFC;
            width: 800px;
            padding: 40px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const NEW_LOGO_URL = "https://i.imgur.com/wEozr34.png";
        const LISTA_BLOCOS_PADRAO = Array.from({ length: 10 }, (_, i) => `BLOCO ${String(i + 1).padStart(2, '0')}`);
        const LISTA_VARIEDADES = ["Syngenta BRO", "Master Tsv", "Pharlap", "Jiraya F1", "OUTRA..."];
        const MUDAS_POR_BANDEJA = 200;

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-10 10Z" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const addDays = (dateStr, days) => {
            const result = new Date(dateStr);
            result.setDate(result.getDate() + days);
            return result.toISOString().split('T')[0];
        };

        function App() {
            const [blocosData, setBlocosData] = useState([]);
            const [editingRef, setEditingRef] = useState(null);
            const [showExportTemplate, setShowExportTemplate] = useState(false);

            const [formData, setFormData] = useState({
                nomeBloco: 'BLOCO 01',
                dataContagem: new Date().toISOString().split('T')[0],
                perdaPlantio: '',
                perdaContagemA: '',
                perdaContagemB: '',
                variedadesList: [{ 
                    id: Math.random().toString(36).substr(2, 9), 
                    nome: 'Syngenta BRO', 
                    bandejas: '', 
                    totalMudas: '', 
                    transplantadoVariedade: '',
                    transplantadoA: '', 
                    transplantadoB: '' 
                }]
            });

            useEffect(() => {
                const localData = localStorage.getItem('oasis_mortalidade_v14');
                if (localData) setBlocosData(JSON.parse(localData));
            }, []);

            const saveToLocal = (data) => {
                localStorage.setItem('oasis_mortalidade_v14', JSON.stringify(data));
                setBlocosData(data);
            };

            const handleBandejasChange = (id, valor) => {
                const numBandejas = parseInt(valor) || 0;
                setFormData(prev => ({
                    ...prev,
                    variedadesList: prev.variedadesList.map(v => 
                        v.id === id ? { 
                            ...v, 
                            bandejas: valor, 
                            totalMudas: valor === '' ? '' : (numBandejas * MUDAS_POR_BANDEJA).toString() 
                        } : v
                    )
                }));
            };

            const calcGeral = useMemo(() => {
                let mudasTotais = 0;
                let transplantadoTotalBloco = 0;
                
                formData.variedadesList.forEach(v => { 
                    mudasTotais += (parseInt(v.totalMudas) || 0);
                    transplantadoTotalBloco += (parseInt(v.transplantadoVariedade) || 0);
                });

                const pP = parseInt(formData.perdaPlantio) || 0;
                const pA = parseInt(formData.perdaContagemA) || 0;
                const pB = parseInt(formData.perdaContagemB) || 0;
                
                const percPlantio = mudasTotais > 0 ? Math.round((pP / mudasTotais) * 100) : 0;
                const percCampo = transplantadoTotalBloco > 0 ? Math.round(((pA + pB) / transplantadoTotalBloco) * 100) : 0;
                
                return { mudasTotais, transplantadoTotalBloco, percPlantio, percCampo, pP, pA, pB };
            }, [formData]);

            const handleSave = (e) => {
                e.preventDefault();
                const dataContagem = formData.dataContagem;
                const dataProxima = addDays(dataContagem, 15);
                const novoRegistro = {
                    id: editingRef ? editingRef.regId : Date.now().toString(),
                    dataContagem: dataContagem,
                    dataProxima: dataProxima,
                    mudasTotais: calcGeral.mudasTotais,
                    totalTransplantadoGeral: calcGeral.transplantadoTotalBloco,
                    perdaPlantio: calcGeral.pP,
                    perdaA: calcGeral.pA,
                    perdaB: calcGeral.pB,
                    percPlantio: calcGeral.percPlantio,
                    percCampo: calcGeral.percCampo,
                    variedades: formData.variedadesList.map(v => ({...v}))
                };
                let updated = [...blocosData];
                if (editingRef) {
                    updated = updated.map(b => b.nome === editingRef.blocoNome ? { ...b, registros: b.registros.filter(r => r.id !== editingRef.regId) } : b);
                }
                const bIdx = updated.findIndex(b => b.nome === formData.nomeBloco);
                if (bIdx !== -1) updated[bIdx].registros.push(novoRegistro);
                else updated.push({ id: Date.now().toString(), nome: formData.nomeBloco, registros: [novoRegistro] });
                saveToLocal(updated.filter(b => b.registros.length > 0));
                setEditingRef(null);
                setFormData({
                    nomeBloco: 'BLOCO 01',
                    dataContagem: new Date().toISOString().split('T')[0],
                    perdaPlantio: '',
                    perdaContagemA: '',
                    perdaContagemB: '',
                    variedadesList: [{ id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '', transplantadoA: '', transplantadoB: '' }]
                });
            };

            const downloadJpeg = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        try {
                            const canvas = await html2canvas(element, { 
                                scale: 2, 
                                useCORS: true, 
                                backgroundColor: '#F8FAFC' 
                            });
                            const link = document.createElement('a');
                            link.download = `Oasis_Relatorio_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.jpg`;
                            link.href = canvas.toDataURL('image/jpeg', 0.9);
                            link.click();
                        } catch (err) {
                            console.error("Erro ao gerar imagem", err);
                        } finally {
                            setShowExportTemplate(false);
                        }
                    }
                }, 500);
            };

            const RegistroCard = ({ reg, blocoNome, isExport = false }) => (
                <div className={`group relative bg-slate-50 rounded-[2.5rem] p-6 border border-slate-100 shadow-sm ${isExport ? 'mb-8' : ''}`}>
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-emerald-100 rounded-2xl text-emerald-700">
                                <SvgIcon name="calendar" className="w-5 h-5"/>
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Data Registro</p>
                                <p className="text-sm font-black text-slate-800">{reg.dataContagem.split('-').reverse().join('/')}</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Total Geral do Bloco</p>
                            <p className="text-xl font-black text-slate-900 leading-none">{(reg.totalTransplantadoGeral || 0).toLocaleString()} <span className="text-[10px] text-slate-400">plantas</span></p>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-white p-4 rounded-3xl border border-orange-100 text-center shadow-sm">
                            <p className="text-[9px] font-black text-orange-500 uppercase mb-1">Perda Plantio</p>
                            <p className="text-2xl font-black text-orange-600 leading-none">{reg.percPlantio}%</p>
                            <p className="text-[9px] font-bold text-orange-400 mt-1 italic">({reg.perdaPlantio} mudas)</p>
                        </div>
                        <div className="bg-white p-4 rounded-3xl border border-red-100 text-center shadow-sm">
                            <p className="text-[9px] font-black text-red-500 uppercase mb-1">Perda Campo</p>
                            <p className="text-2xl font-black text-red-600 leading-none">{reg.percCampo}%</p>
                            <p className="text-[9px] font-bold text-red-400 mt-1 italic">({(reg.perdaA || 0) + (reg.perdaB || 0)} mudas)</p>
                        </div>
                    </div>

                    <div className="space-y-4 mb-6">
                        {reg.variedades.map((v, i) => (
                            <div key={i} className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-start mb-4 border-b border-slate-50 pb-3">
                                    <div>
                                        <p className="font-black text-xs text-emerald-900 uppercase">{v.nome}</p>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase">{v.bandejas} Bandejas / {v.totalMudas} Mudas</p>
                                    </div>
                                    <div className="bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100 text-right">
                                        <p className="text-[8px] font-black text-emerald-600 uppercase">Total Variedade</p>
                                        <p className="text-xs font-black text-emerald-800">{v.transplantadoVariedade || 0}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                                        <p className="text-[8px] text-slate-400 uppercase font-black mb-1">Área A</p>
                                        <p className="text-sm font-black text-slate-700">{v.transplantadoA || 0}</p>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                                        <p className="text-[8px] text-slate-400 uppercase font-black mb-1">Área B</p>
                                        <p className="text-sm font-black text-slate-700">{v.transplantadoB || 0}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {!isExport && (
                        <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                            <div className="flex gap-4 items-center">
                                <div className="flex flex-col">
                                    <span className="text-[8px] font-black text-slate-400 uppercase mb-1">Revisão Campo</span>
                                    <span className="text-[11px] font-black text-emerald-700 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100">{reg.dataProxima ? reg.dataProxima.split('-').reverse().join('/') : '---'}</span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => {
                                    setFormData({
                                        nomeBloco: blocoNome,
                                        dataContagem: reg.dataContagem,
                                        perdaPlantio: reg.perdaPlantio,
                                        perdaContagemA: reg.perdaA,
                                        perdaContagemB: reg.perdaB,
                                        variedadesList: reg.variedades.map(v => ({...v}))
                                    });
                                    setEditingRef({ blocoNome, regId: reg.id });
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }} className="p-2 text-slate-400 hover:text-orange-500 rounded-xl transition-all"><SvgIcon name="edit" className="w-5 h-5"/></button>
                                <button onClick={() => saveToLocal(blocosData.map(b => b.nome === blocoNome ? {...b, registros: b.registros.filter(r => r.id !== reg.id)} : b).filter(b => b.registros.length > 0))} className="p-2 text-slate-400 hover:text-red-500 rounded-xl transition-all"><SvgIcon name="trash" className="w-5 h-5"/></button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-[#062C1B] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={NEW_LOGO_URL} className="h-10" />
                                <div>
                                    <h1 className="font-black uppercase text-lg leading-none tracking-tight">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest leading-none mt-1">Gestão de Plantio</p>
                                </div>
                            </div>
                            <button onClick={downloadJpeg} className="bg-red-600 p-3 rounded-2xl hover:bg-red-700 shadow-lg active:scale-95 transition-all">
                                <SvgIcon name="download" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[460px_1fr] gap-8">
                        <section className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                                <h2 className="text-[11px] font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                                    <SvgIcon name="leaf" className="text-emerald-600 w-4 h-4" />
                                    {editingRef ? 'Editando Lançamento' : 'Novo Lançamento'}
                                </h2>
                                <form onSubmit={handleSave} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Bloco de Plantio</label>
                                            <select value={formData.nomeBloco} onChange={e => setFormData({...formData, nomeBloco: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-black outline-none focus:ring-2 focus:ring-emerald-500/20">
                                                {LISTA_BLOCOS_PADRAO.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Data Transplante</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-black text-emerald-700 uppercase tracking-widest px-1">Variedades do Bloco</p>
                                        {formData.variedadesList.map((v) => (
                                            <div key={v.id} className="p-4 bg-slate-50 rounded-3xl border border-slate-100 space-y-4 relative overflow-hidden">
                                                <div className="flex justify-between items-center px-1">
                                                    <select value={v.nome} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, nome: e.target.value} : item)})} className="bg-transparent text-xs font-black uppercase outline-none text-emerald-900 z-10">
                                                        {LISTA_VARIEDADES.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                    {formData.variedadesList.length > 1 && (
                                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: formData.variedadesList.filter(item => item.id !== v.id)})} className="text-red-400 p-1 hover:bg-red-50 rounded-lg transition-colors z-10"><SvgIcon name="trash" className="w-4 h-4"/></button>
                                                    )}
                                                </div>
                                                
                                                {/* Seção Principal: Bandejas e Total Transplantado Manual */}
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div className="text-center">
                                                        <p className="text-[7px] font-black text-slate-400 uppercase mb-1">Bandejas</p>
                                                        <input type="number" value={v.bandejas} onChange={e => handleBandejasChange(v.id, e.target.value)} className="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-center outline-none" placeholder="0" />
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[7px] font-black text-slate-400 uppercase mb-1">Mudas Total</p>
                                                        <div className="w-full p-2 bg-blue-50 text-blue-700 border border-blue-100 rounded-xl text-xs font-black text-center">{v.totalMudas || '0'}</div>
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[7px] font-black text-emerald-600 uppercase mb-1">Transplantado</p>
                                                        <input type="number" value={v.transplantadoVariedade} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, transplantadoVariedade: e.target.value} : item)})} className="w-full p-2 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl text-xs font-black text-center outline-none" placeholder="0" />
                                                    </div>
                                                </div>

                                                {/* Detalhamento: Áreas A e B */}
                                                <div className="bg-white p-3 rounded-2xl border border-slate-200">
                                                    <p className="text-[7px] font-black text-slate-400 uppercase mb-2 text-center">Registro de Contagem (Opcional)</p>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div>
                                                            <p className="text-[7px] font-black text-slate-400 uppercase text-center mb-1">Área A</p>
                                                            <input type="number" value={v.transplantadoA} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, transplantadoA: e.target.value} : item)})} className="w-full p-2 bg-slate-50 border border-slate-100 rounded-xl text-xs font-black text-center outline-none" placeholder="0" />
                                                        </div>
                                                        <div>
                                                            <p className="text-[7px] font-black text-slate-400 uppercase text-center mb-1">Área B</p>
                                                            <input type="number" value={v.transplantadoB} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, transplantadoB: e.target.value} : item)})} className="w-full p-2 bg-slate-50 border border-slate-100 rounded-xl text-xs font-black text-center outline-none" placeholder="0" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: [...formData.variedadesList, { id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '', transplantadoA: '', transplantadoB: '' }]})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-[9px] font-black text-slate-400 uppercase hover:bg-emerald-50 transition-all">+ Adicionar Outra Variedade</button>
                                    </div>

                                    <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-lg">
                                        <div className="flex justify-between items-center mb-1">
                                            <p className="text-[9px] font-black uppercase text-emerald-400 tracking-widest">Soma Total do Bloco</p>
                                            <SvgIcon name="target" className="w-4 h-4 text-emerald-400" />
                                        </div>
                                        <p className="text-3xl font-black">{calcGeral.transplantadoTotalBloco.toLocaleString()} <span className="text-xs font-normal text-emerald-300">plantas</span></p>
                                    </div>

                                    <div className="space-y-4 pt-4">
                                        <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-[9px] font-black text-orange-700 uppercase">Perda no Plantio (Bandeja)</label>
                                                <span className="text-[11px] font-black text-orange-600 bg-white px-2 py-0.5 rounded-lg">{calcGeral.percPlantio}%</span>
                                            </div>
                                            <input type="number" value={formData.perdaPlantio} onChange={e => setFormData({...formData, perdaPlantio: e.target.value})} className="w-full p-3 bg-white border border-orange-200 rounded-2xl text-xs font-black outline-none" placeholder="Qtd mudas perdidas" />
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-3xl border border-red-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-[9px] font-black text-red-700 uppercase">Mortalidade no Campo</label>
                                                <span className="text-[11px] font-black text-red-600 bg-white px-2 py-0.5 rounded-lg">{calcGeral.percCampo}%</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="number" value={formData.perdaContagemA} onChange={e => setFormData({...formData, perdaContagemA: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Morte Área A" />
                                                <input type="number" value={formData.perdaContagemB} onChange={e => setFormData({...formData, perdaContagemB: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Morte Área B" />
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-[#062C1B] text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl hover:bg-emerald-950 active:scale-95 transition-all">
                                        {editingRef ? "Atualizar Bloco" : "Salvar Registro de Bloco"}
                                    </button>
                                </form>
                            </div>
                        </section>

                        <section className="space-y-6">
                            {blocosData.length === 0 ? (
                                <div className="p-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 text-slate-300 font-black uppercase text-xs">
                                    Histórico Vazio
                                </div>
                            ) : (
                                [...blocosData].reverse().map(bloco => (
                                    <div key={bloco.id} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-md overflow-hidden">
                                        <div className="bg-[#062C1B] p-5 text-white px-8 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-8 bg-emerald-400 rounded-full"></div>
                                                <h3 className="font-black text-base uppercase tracking-widest">{bloco.nome}</h3>
                                            </div>
                                            <p className="text-[10px] font-bold uppercase text-emerald-400">{bloco.registros.length} Registro(s)</p>
                                        </div>
                                        <div className="p-6 space-y-8">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {showExportTemplate && (
                        <div id="export-container">
                            <div className="flex justify-between items-center mb-10 pb-6 border-b-2 border-emerald-900/10">
                                <div className="flex items-center gap-4">
                                    <img src={NEW_LOGO_URL} className="h-12" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="font-black uppercase text-2xl text-[#062C1B]">Relatório de Plantio</h1>
                                        <p className="text-xs text-emerald-600 font-bold uppercase tracking-widest">Fazenda Oásis</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-black text-slate-400 uppercase">Exportado em</p>
                                    <p className="text-lg font-black text-slate-800">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>
                            
                            <div className="space-y-12">
                                {blocosData.map(bloco => (
                                    <div key={bloco.id} className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-900 p-4 text-white px-8">
                                            <h3 className="font-black text-lg uppercase tracking-widest">{bloco.nome}</h3>
                                        </div>
                                        <div className="p-8 space-y-10">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} isExport={true} />
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
