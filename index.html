<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F1F5F9;
        }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            width: 850px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const SvgIcon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const getFutureDate = (days) => {
                const d = new Date();
                d.setDate(d.getDate() + days);
                return d.toISOString().split('T')[0];
            };

            const initialForm = {
                dataContagem: new Date().toISOString().split('T')[0],
                proximaContagem: getFutureDate(15),
                totalBandejas: '',
                linhasA: '',
                linhasB: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: '',
                perdaPosA: '',
                perdaPosB: ''
            };

            const [formData, setFormData] = useState(initialForm);

            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v3');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v3', JSON.stringify(data));
                setRegistros(data);
            };

            const calculos = useMemo(() => {
                const totalM = (Number(formData.totalBandejas) || 0) * 200;
                const totalPLote = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const pPosA = Number(formData.perdaPosA) || 0;
                const pPosB = Number(formData.perdaPosB) || 0;

                const totalTrans = transA + transB;
                const totalPPos = pPosA + pPosB;

                return {
                    totalMudas: totalM,
                    percPerdaLote: totalM > 0 ? Math.round((totalPLote / totalM) * 100) : 0,
                    percPos: totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0,
                    totalTrans,
                    totalPPos
                };
            }, [formData]);

            const handleAdd = (e) => {
                e.preventDefault();
                const novo = {
                    ...formData,
                    id: Date.now(),
                    totalMudas: calculos.totalMudas,
                    percPerdaLote: calculos.percPerdaLote,
                    percPos: calculos.percPos,
                    totalTransplantado: calculos.totalTrans,
                    totalPerdasPos: calculos.totalPPos
                };
                save([novo, ...registros]);
                setFormData({...initialForm, dataContagem: new Date().toISOString().split('T')[0], proximaContagem: getFutureDate(15)});
            };

            const exportImage = async () => {
                setShowExport(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(reportRef.current, { scale: 2 });
                    const link = document.createElement('a');
                    link.download = `Gestao_Perdas_Oasis.jpg`;
                    link.href = canvas.toDataURL('image/jpeg');
                    link.click();
                    setShowExport(false);
                }, 500);
            };

            return (
                <div className="min-h-screen pb-12 text-slate-900">
                    <header className="bg-[#062C1B] text-white p-6 shadow-xl sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-12" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Gestão de Perdas</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportImage} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-black uppercase flex items-center gap-2 transition-all">
                                    <SvgIcon name="download" /> Exportar Relatório
                                </button>
                                <button onClick={() => { if(confirm("Zerar todos os registros?")) save([]); }} className="bg-red-900/50 hover:bg-red-600 text-white p-2 rounded-xl transition-all">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[400px_1fr] gap-8 mt-4">
                        <aside>
                            <div className="bg-white p-6 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-sm font-black text-slate-900 uppercase mb-6 flex items-center gap-2">
                                    <div className="p-2 bg-emerald-100 rounded-lg"><SvgIcon name="trendingDown" className="text-emerald-700 w-4 h-4"/></div>
                                    Nova Contagem de Perdas
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1 block mb-1">Data Contagem</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:ring-2 focus:ring-emerald-500 outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-emerald-600 uppercase ml-1 block mb-1">Próxima (15 dias)</label>
                                            <input type="date" value={formData.proximaContagem} className="w-full p-3 bg-emerald-50 border border-emerald-100 rounded-xl text-xs font-bold text-emerald-700 outline-none" readOnly />
                                        </div>
                                    </div>

                                    {/* Campos Novos: Linhas de Canteiro */}
                                    <div className="grid grid-cols-2 gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="col-span-2 text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1 flex items-center gap-1">
                                            <SvgIcon name="grid" className="w-2.5 h-2.5" /> Configuração de Canteiros
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-500 uppercase ml-1 block mb-1">Linhas Canteiro A</label>
                                            <input type="number" placeholder="0" value={formData.linhasA} onChange={e => setFormData({...formData, linhasA: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-bold text-slate-500 uppercase ml-1 block mb-1">Linhas Canteiro B</label>
                                            <input type="number" placeholder="0" value={formData.linhasB} onChange={e => setFormData({...formData, linhasB: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-900 p-4 rounded-2xl shadow-inner">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1 block mb-1">Total Bandejas</label>
                                            <input type="number" placeholder="0" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white border-none text-2xl font-black focus:ring-0 outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-4 rounded-2xl shadow-inner flex flex-col justify-center">
                                            <label className="text-[9px] font-black text-emerald-400 uppercase ml-1 block mb-1">Total Mudas</label>
                                            <div className="text-white text-2xl font-black">{formatNumber(calculos.totalMudas)}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Transplantado Lado A</label>
                                            <input type="number" placeholder="0" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full bg-transparent text-lg font-black outline-none" />
                                        </div>
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-1">Transplantado Lado B</label>
                                            <input type="number" placeholder="0" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full bg-transparent text-lg font-black outline-none" />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[9px] font-black text-orange-700 uppercase">Perdas de Transplantio</label>
                                            <span className="text-[10px] font-black text-orange-800">{calculos.percPerdaLote}%</span>
                                        </div>
                                        <input type="number" placeholder="Qtde perdas" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-xl font-black text-orange-900 outline-none" required />
                                    </div>

                                    <div className="bg-red-50 p-5 rounded-2xl border border-red-200 space-y-4">
                                        <div className="flex justify-between items-center border-b border-red-200 pb-2">
                                            <label className="text-[9px] font-black text-red-700 uppercase">Perdas Pós-Transplantio</label>
                                            <div className="text-right">
                                                <p className="text-[8px] text-red-400 uppercase font-black">Total: {calculos.totalPPos}</p>
                                                <p className="text-xs font-black text-red-800">{calculos.percPos}%</p>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[8px] font-bold text-red-500 uppercase block">Lado A</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosA} onChange={e => setFormData({...formData, perdaPosA: e.target.value})} className="w-full bg-transparent text-lg font-black text-red-900 outline-none" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-bold text-red-500 uppercase block">Lado B</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosB} onChange={e => setFormData({...formData, perdaPosB: e.target.value})} className="w-full bg-transparent text-lg font-black text-red-900 outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                                        <SvgIcon name="check" /> Finalizar Registro
                                    </button>
                                </form>
                            </div>
                        </aside>

                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="bg-white p-20 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                                    <p className="text-slate-400 font-bold uppercase text-xs tracking-widest leading-loose">
                                        Gerencie as perdas da Fazenda Oásis<br/>
                                        <span className="text-[10px] opacity-60">Nenhum dado registrado até o momento</span>
                                    </p>
                                </div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[2rem] p-6 card-shadow border border-slate-200 flex flex-col gap-6 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-2 h-full bg-emerald-600"></div>
                                        
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-slate-100 p-2 rounded-lg"><SvgIcon name="calendar" className="text-slate-600 w-4 h-4"/></div>
                                                <div>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase">Referência</p>
                                                    <p className="text-sm font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                            </div>
                                            
                                            {/* Badge de Linhas no Histórico */}
                                            <div className="flex gap-2">
                                                <div className="px-3 py-1.5 bg-slate-900 rounded-lg flex flex-col items-center min-w-[60px]">
                                                    <span className="text-[7px] font-black text-slate-400 uppercase leading-none mb-0.5">L. Cant. A</span>
                                                    <span className="text-xs font-black text-white">{reg.linhasA || 0}</span>
                                                </div>
                                                <div className="px-3 py-1.5 bg-slate-900 rounded-lg flex flex-col items-center min-w-[60px]">
                                                    <span className="text-[7px] font-black text-slate-400 uppercase leading-none mb-0.5">L. Cant. B</span>
                                                    <span className="text-xs font-black text-white">{reg.linhasB || 0}</span>
                                                </div>
                                            </div>

                                            <div className="px-4 py-2 bg-emerald-50 rounded-xl border border-emerald-100 ml-auto">
                                                <p className="text-[9px] font-black text-emerald-600 uppercase">Próxima Contagem</p>
                                                <p className="text-sm font-black text-emerald-700">{reg.proximaContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-red-300 hover:text-red-600 transition-colors">
                                                <SvgIcon name="trash" className="w-4 h-4" />
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-2xl">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">Mudas Lote</p>
                                                <p className="text-xl font-black">{formatNumber(reg.totalMudas)}</p>
                                                <p className="text-[9px] font-bold opacity-50 mt-1">{reg.totalBandejas} Bandejas</p>
                                            </div>
                                            
                                            {/* Destaque Lado A e B em Cartão Fechado */}
                                            <div className="bg-emerald-900 p-4 rounded-2xl text-white shadow-lg md:col-span-1">
                                                <p className="text-[9px] font-bold text-emerald-400 uppercase mb-2 flex justify-between">
                                                    Transplantados <span>Total: {formatNumber(reg.totalTransplantado)}</span>
                                                </p>
                                                <div className="flex justify-between items-end border-t border-emerald-800 pt-2 gap-4">
                                                    <div className="flex-1">
                                                        <p className="text-[8px] font-black text-emerald-500 uppercase leading-none">Lado A</p>
                                                        <p className="text-lg font-black">{formatNumber(reg.transplantadoA)}</p>
                                                    </div>
                                                    <div className="w-px h-6 bg-emerald-800 self-center"></div>
                                                    <div className="flex-1 text-right">
                                                        <p className="text-[8px] font-black text-emerald-500 uppercase leading-none">Lado B</p>
                                                        <p className="text-lg font-black">{formatNumber(reg.transplantadoB)}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                                                <p className="text-[9px] font-bold text-orange-600 uppercase mb-1">Perda Transp.</p>
                                                <p className="text-xl font-black text-orange-700">{formatNumber(reg.totalPerdasLote)}</p>
                                                <p className="text-[9px] font-bold text-orange-400 mt-1">{reg.percPerdaLote}%</p>
                                            </div>

                                            <div className="bg-red-50 p-4 rounded-2xl border border-red-100">
                                                <p className="text-[9px] font-bold text-red-600 uppercase mb-1">Perda Pós-T.</p>
                                                <p className="text-xl font-black text-red-700">{formatNumber(reg.totalPerdasPos)}</p>
                                                <p className="text-[9px] font-bold text-red-400 mt-1">{reg.percPos}% (A:{reg.perdaPosA} B:{reg.perdaPosB})</p>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* Template Exportação */}
                    {showExport && (
                        <div id="export-container" ref={reportRef} className="p-10 bg-white">
                            <div className="bg-[#062C1B] p-10 rounded-t-[3rem] flex justify-between items-center text-white">
                                <div className="flex items-center gap-8">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-24" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="text-5xl font-black uppercase tracking-tighter leading-none">Fazenda Oásis</h1>
                                        <p className="text-lg font-bold text-emerald-400 uppercase tracking-[0.4em] mt-2">Relatório de Gestão de Perdas</p>
                                    </div>
                                </div>
                            </div>

                            <div className="p-10 bg-slate-50 rounded-b-[3rem] border-x border-b border-slate-200">
                                <div className="space-y-8">
                                    {registros.map(reg => (
                                        <div key={reg.id} className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                            <div className="flex justify-between border-b pb-6 mb-6">
                                                <div>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Data Contagem</p>
                                                    <p className="text-2xl font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                    <p className="text-[8px] font-black text-slate-300 uppercase mt-1">L. Cant: A({reg.linhasA}) B({reg.linhasB})</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Próxima Contagem</p>
                                                    <p className="text-2xl font-black text-emerald-700">{reg.proximaContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-4 gap-8 mb-8">
                                                <div className="text-center">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase">Total Mudas</p>
                                                    <p className="text-3xl font-black">{formatNumber(reg.totalMudas)}</p>
                                                    <p className="text-[10px] font-bold opacity-30">{reg.totalBandejas} Bandejas</p>
                                                </div>
                                                <div className="text-center bg-emerald-900 text-white rounded-2xl p-4">
                                                    <p className="text-[10px] font-black text-emerald-400 uppercase">Transplantados</p>
                                                    <p className="text-2xl font-black">{formatNumber(reg.totalTransplantado)}</p>
                                                    <div className="text-[8px] font-bold text-emerald-500 mt-1">A:{formatNumber(reg.transplantadoA)} | B:{formatNumber(reg.transplantadoB)}</div>
                                                </div>
                                                <div className="text-center bg-orange-50 p-4 rounded-2xl">
                                                    <p className="text-[10px] font-black text-orange-600 uppercase">Perda Transp.</p>
                                                    <p className="text-3xl font-black text-orange-700">{formatNumber(reg.totalPerdasLote)}</p>
                                                    <p className="text-xs font-bold text-orange-400">{reg.percPerdaLote}%</p>
                                                </div>
                                                <div className="text-center bg-red-50 p-4 rounded-2xl">
                                                    <p className="text-[10px] font-black text-red-600 uppercase">Perda Pós-T.</p>
                                                    <p className="text-3xl font-black text-red-700">{formatNumber(reg.totalPerdasPos)}</p>
                                                    <p className="text-xs font-bold text-red-400">{reg.percPos}%</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-12 text-center">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Excelência Fazenda Oásis • {new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
