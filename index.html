<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Registro de Mortalidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #F8FAFC;
            width: 800px; 
            padding: 30px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const NEW_LOGO_URL = "https://i.imgur.com/wEozr34.png";
        const LISTA_BLOCOS_PADRAO = Array.from({ length: 15 }, (_, i) => `BLOCO ${String(i + 1).padStart(2, '0')}`);
        const LISTA_VARIEDADES = ["Syngenta BRO", "Master Tsv", "Pharlap", "Jiraya F1", "OUTRA..."];
        const MUDAS_POR_BANDEJA = 200;

        const formatNum = (num) => {
            if (num === '' || num === undefined) return '0';
            const n = parseFloat(num) || 0;
            return n.toLocaleString('pt-PT');
        };

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-10 10Z" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                pdf: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                droplet: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" />,
                chart: <><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const addDays = (dateStr, days) => {
            const result = new Date(dateStr);
            result.setDate(result.getDate() + days);
            return result.toISOString().split('T')[0];
        };

        const ComparisonDashboard = ({ reg }) => {
            const valP = parseFloat(reg.percPlantio) || 0;
            const valC = parseFloat(reg.percCampo) || 0;
            const totalPerdas = valP + valC || 0.1;
            
            const maxPlantado = Math.max(reg.somaAreaA, reg.somaAreaB, 1);
            const widthA = (reg.somaAreaA / maxPlantado) * 100;
            const widthB = (reg.somaAreaB / maxPlantado) * 100;

            return (
                <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 mt-4 flex flex-col gap-8">
                    {/* Linha Superior: Gráfico de Pizza centralizado */}
                    <div className="flex flex-col items-center">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Proporção de Perdas (%)</p>
                        <div className="flex items-center gap-8">
                            <div className="relative w-28 h-28 shrink-0">
                                <svg viewBox="0 0 42 42" className="w-full h-full -rotate-90">
                                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#fee2e2" strokeWidth="6"></circle>
                                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#ef4444" strokeWidth="6" strokeDasharray={`${(valC/totalPerdas)*100} ${100 - (valC/totalPerdas)*100}`} strokeDashoffset="0"></circle>
                                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#f97316" strokeWidth="6" strokeDasharray={`${(valP/totalPerdas)*100} ${100 - (valP/totalPerdas)*100}`} strokeDashoffset={`${-(valC/totalPerdas)*100}`}></circle>
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <span className="text-[12px] font-black text-slate-900 leading-none">{(valP + valC).toFixed(1)}%</span>
                                    <span className="text-[7px] font-bold text-slate-400 uppercase mt-1">Total</span>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div className="flex items-center gap-3">
                                    <div className="w-3 h-3 rounded-full bg-orange-500"></div>
                                    <div>
                                        <p className="text-[8px] font-black text-slate-400 uppercase">No Plantio</p>
                                        <p className="text-xs font-black text-orange-600">{reg.percPlantio}%</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                    <div>
                                        <p className="text-[8px] font-black text-slate-400 uppercase">No Campo</p>
                                        <p className="text-xs font-black text-red-600">{reg.percCampo}%</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Linha Inferior: Gráfico de Barras Horizontais */}
                    <div className="flex flex-col gap-4 border-t border-slate-200 pt-6">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Volume Plantado por Área (un)</p>
                        
                        <div className="space-y-4">
                            {/* Barra Área A */}
                            <div className="space-y-1.5">
                                <div className="flex justify-between items-end px-1">
                                    <span className="text-[10px] font-black text-emerald-800 uppercase">Área A</span>
                                    <span className="text-[10px] font-black text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-lg border border-emerald-200 shadow-sm">
                                        {formatNum(reg.somaAreaA)}
                                    </span>
                                </div>
                                <div className="w-full bg-slate-200 h-6 rounded-full overflow-hidden">
                                    <div 
                                        className="h-full bg-emerald-500 rounded-full transition-all duration-700 ease-out"
                                        style={{ width: `${widthA}%` }}
                                    ></div>
                                </div>
                            </div>

                            {/* Barra Área B */}
                            <div className="space-y-1.5">
                                <div className="flex justify-between items-end px-1">
                                    <span className="text-[10px] font-black text-emerald-950 uppercase">Área B</span>
                                    <span className="text-[10px] font-black text-emerald-900 bg-emerald-200 px-2 py-0.5 rounded-lg border border-emerald-300 shadow-sm">
                                        {formatNum(reg.somaAreaB)}
                                    </span>
                                </div>
                                <div className="w-full bg-slate-200 h-6 rounded-full overflow-hidden">
                                    <div 
                                        className="h-full bg-[#062C1B] rounded-full transition-all duration-700 ease-out"
                                        style={{ width: `${widthB}%` }}
                                    ></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [blocosData, setBlocosData] = useState([]);
            const [editingRef, setEditingRef] = useState(null);
            const [showExportTemplate, setShowExportTemplate] = useState(false);

            const [formData, setFormData] = useState({
                nomeBloco: 'BLOCO 01',
                dataContagem: new Date().toISOString().split('T')[0],
                areaM2: '', areaHectares: '',
                perdaPlantio: '', perdaContagemA: '', perdaContagemB: '',
                transplantadoA: '', transplantadoB: '',
                microA: '', asperA: '', linhasA: '',
                microB: '', asperB: '', linhasB: '',
                variedadesList: [{ id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '' }]
            });

            useEffect(() => {
                const localData = localStorage.getItem('oasis_mortalidade_v24');
                if (localData) setBlocosData(JSON.parse(localData));
            }, []);

            const saveToLocal = (data) => {
                localStorage.setItem('oasis_mortalidade_v24', JSON.stringify(data));
                setBlocosData(data);
            };

            const handleBandejasChange = (id, valor) => {
                const numBandejas = parseInt(valor) || 0;
                setFormData(prev => ({
                    ...prev,
                    variedadesList: prev.variedadesList.map(v => 
                        v.id === id ? { 
                            ...v, 
                            bandejas: valor, 
                            totalMudas: valor === '' ? '' : (numBandejas * MUDAS_POR_BANDEJA).toString() 
                        } : v
                    )
                }));
            };

            const calcGeral = useMemo(() => {
                let mudasTotaisBandeja = 0;
                formData.variedadesList.forEach(v => { 
                    mudasTotaisBandeja += (parseInt(v.totalMudas) || 0);
                });
                const tA = parseInt(formData.transplantadoA) || 0;
                const tB = parseInt(formData.transplantadoB) || 0;
                const totalEfetivo = tA + tB;
                const pP = parseInt(formData.perdaPlantio) || 0;
                const pA = parseInt(formData.perdaContagemA) || 0;
                const pB = parseInt(formData.perdaContagemB) || 0;
                const percPlantio = mudasTotaisBandeja > 0 ? ((pP / mudasTotaisBandeja) * 100).toFixed(1) : 0;
                const percCampo = totalEfetivo > 0 ? (((pA + pB) / totalEfetivo) * 100).toFixed(1) : 0;
                return { mudasTotaisBandeja, totalEfetivo, somaAreaA: tA, somaAreaB: tB, percPlantio, percCampo, pP, pA, pB };
            }, [formData]);

            const handleSave = (e) => {
                e.preventDefault();
                const dataContagem = formData.dataContagem;
                const dataProxima = addDays(dataContagem, 15);
                const novoRegistro = {
                    id: editingRef ? editingRef.regId : Date.now().toString(),
                    dataContagem: dataContagem,
                    dataProxima: dataProxima,
                    areaM2: formData.areaM2, areaHectares: formData.areaHectares,
                    mudasTotais: calcGeral.mudasTotaisBandeja,
                    totalTransplantadoGeral: calcGeral.totalEfetivo,
                    somaAreaA: calcGeral.somaAreaA, somaAreaB: calcGeral.somaAreaB,
                    perdaPlantio: calcGeral.pP, perdaA: calcGeral.pA, perdaB: calcGeral.pB,
                    percPlantio: calcGeral.percPlantio, percCampo: calcGeral.percCampo,
                    microA: formData.microA, asperA: formData.asperA, linhasA: formData.linhasA,
                    microB: formData.microB, asperB: formData.asperB, linhasB: formData.linhasB,
                    variedades: formData.variedadesList.map(v => ({...v}))
                };
                let updated = [...blocosData];
                if (editingRef) {
                    updated = updated.map(b => b.nome === editingRef.blocoNome ? { ...b, registros: b.registros.filter(r => r.id !== editingRef.regId) } : b);
                }
                const bIdx = updated.findIndex(b => b.nome === formData.nomeBloco);
                if (bIdx !== -1) updated[bIdx].registros.push(novoRegistro);
                else updated.push({ id: Date.now().toString(), nome: formData.nomeBloco, registros: [novoRegistro] });
                saveToLocal(updated.filter(b => b.registros.length > 0));
                setEditingRef(null);
                setFormData({
                    nomeBloco: 'BLOCO 01', dataContagem: new Date().toISOString().split('T')[0],
                    areaM2: '', areaHectares: '', perdaPlantio: '', perdaContagemA: '', perdaContagemB: '',
                    transplantadoA: '', transplantadoB: '', microA: '', asperA: '', linhasA: '',
                    microB: '', asperB: '', linhasB: '',
                    variedadesList: [{ id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '' }]
                });
            };

            const downloadJpeg = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#F8FAFC' });
                        const link = document.createElement('a');
                        link.download = `Oasis_Relatorio_${new Date().toLocaleDateString('pt-PT').replace(/\//g, '-')}.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.8);
                        link.click();
                        setShowExportTemplate(false);
                    }
                }, 500);
            };

            const downloadPdf = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        const canvas = await html2canvas(element, { scale: 2.5, useCORS: true });
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF('p', 'mm', 'a4');
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                        pdf.save(`Oasis_Relatorio_${new Date().toLocaleDateString('pt-PT').replace(/\//g, '-')}.pdf`);
                        setShowExportTemplate(false);
                    }
                }, 500);
            };

            const RegistroCard = ({ reg, blocoNome, isExport = false }) => (
                <div className={`bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm ${isExport ? 'mb-10 ring-1 ring-slate-100' : ''}`}>
                    {isExport && (
                        <div className="flex items-center gap-2 mb-4">
                            <div className="w-1.5 h-6 bg-[#062C1B] rounded-full"></div>
                            <h4 className="font-black text-slate-800 uppercase text-sm tracking-widest">{blocoNome}</h4>
                        </div>
                    )}
                    
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-emerald-100 rounded-2xl text-emerald-700">
                                <SvgIcon name="calendar" className="w-5 h-5"/>
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Data Transplante</p>
                                <p className="text-sm font-black text-slate-800">{reg.dataContagem.split('-').reverse().join('/')}</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Total Plantado Efetivo</p>
                            <p className="text-xl font-black text-slate-900 leading-none">{formatNum(reg.totalTransplantadoGeral)} <span className="text-xs text-slate-400 font-bold ml-1">un</span></p>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 mb-6">
                        <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                            <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Área Total (m²)</p>
                            <p className="text-xs font-black text-slate-700">{reg.areaM2 ? formatNum(reg.areaM2) + ' m²' : '---'}</p>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                            <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Área Total (ha)</p>
                            <p className="text-xs font-black text-slate-700">{reg.areaHectares ? reg.areaHectares + ' ha' : '---'}</p>
                        </div>
                    </div>
                    
                    {/* Painel de Gráficos Integrado */}
                    <ComparisonDashboard reg={reg} />

                    <div className="bg-emerald-50/40 p-5 rounded-[2rem] mt-6 mb-6 border border-emerald-100">
                        <p className="text-[9px] font-black text-emerald-800 uppercase text-center tracking-widest mb-4 opacity-70">Detalhes de Infraestrutura</p>
                        <div className="grid grid-cols-2 gap-6">
                            <div className="space-y-3">
                                <div className="text-center p-2 bg-white rounded-2xl border border-emerald-100 shadow-sm">
                                    <p className="text-[8px] text-emerald-600 uppercase font-black mb-1">LADO A</p>
                                    <p className="text-[9px] font-bold text-red-500 italic">Morte: -{formatNum(reg.perdaA)}</p>
                                </div>
                                <div className="p-3 bg-white/60 rounded-2xl space-y-1.5 border border-emerald-50 shadow-sm">
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Microasp:</span><span className="font-black text-emerald-700">{reg.microA || '0'}</span></div>
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Aspersor:</span><span className="font-black text-emerald-700">{reg.asperA || '0'}</span></div>
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Linhas:</span><span className="font-black text-emerald-700">{reg.linhasA || '0'}</span></div>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div className="text-center p-2 bg-white rounded-2xl border border-emerald-100 shadow-sm">
                                    <p className="text-[8px] text-emerald-600 uppercase font-black mb-1">LADO B</p>
                                    <p className="text-[9px] font-bold text-red-500 italic">Morte: -{formatNum(reg.perdaB)}</p>
                                </div>
                                <div className="p-3 bg-white/60 rounded-2xl space-y-1.5 border border-emerald-50 shadow-sm">
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Microasp:</span><span className="font-black text-emerald-700">{reg.microB || '0'}</span></div>
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Aspersor:</span><span className="font-black text-emerald-700">{reg.asperB || '0'}</span></div>
                                    <div className="flex justify-between text-[9px]"><span className="text-slate-400 font-bold">Linhas:</span><span className="font-black text-emerald-700">{reg.linhasB || '0'}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3 mb-6">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-2">Variedades Plantadas</p>
                        {reg.variedades.map((v, i) => (
                            <div key={i} className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                                <div>
                                    <p className="font-black text-[10px] text-emerald-900 uppercase">{v.nome}</p>
                                    <p className="text-[8px] text-slate-400 font-bold">{v.bandejas} Bandj. | {formatNum(v.totalMudas)} Mudas</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[8px] font-black text-emerald-600 uppercase">Efetuado</p>
                                    <p className="text-xs font-black text-emerald-800">{formatNum(v.transplantadoVariedade)}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between items-center pt-4 border-t-2 border-dashed border-slate-100">
                        <div className="flex flex-col">
                            <span className="text-[9px] font-black text-slate-400 uppercase mb-1">Próxima Contagem (15 dias)</span>
                            <span className="text-xs font-black text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-xl border border-emerald-200">
                                {reg.dataProxima ? reg.dataProxima.split('-').reverse().join('/') : '---'}
                            </span>
                        </div>
                        
                        {!isExport && (
                            <div className="flex gap-2">
                                <button onClick={() => {
                                    setFormData({
                                        nomeBloco: blocoNome, dataContagem: reg.dataContagem,
                                        areaM2: reg.areaM2 || '', areaHectares: reg.areaHectares || '',
                                        perdaPlantio: reg.perdaPlantio, perdaContagemA: reg.perdaA, perdaContagemB: reg.perdaB,
                                        transplantadoA: reg.somaAreaA, transplantadoB: reg.somaAreaB,
                                        microA: reg.microA || '', asperA: reg.asperA || '', linhasA: reg.linhasA || '',
                                        microB: reg.microB || '', asperB: reg.asperB || '', linhasB: reg.linhasB || '',
                                        variedadesList: reg.variedades.map(v => ({...v}))
                                    });
                                    setEditingRef({ blocoNome, regId: reg.id });
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }} className="p-3 text-slate-400 hover:text-orange-500 rounded-xl transition-all"><SvgIcon name="edit" className="w-5 h-5"/></button>
                                <button onClick={() => saveToLocal(blocosData.map(b => b.nome === blocoNome ? {...b, registros: b.registros.filter(r => r.id !== reg.id)} : b).filter(b => b.registros.length > 0))} className="p-3 text-slate-400 hover:text-red-500 rounded-xl transition-all"><SvgIcon name="trash" className="w-5 h-5"/></button>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-[#062C1B] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={NEW_LOGO_URL} className="h-10" />
                                <div>
                                    <h1 className="font-black uppercase text-lg leading-none tracking-tight">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest leading-none mt-1">Gestão de Mortalidade</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={downloadJpeg} title="Exportar Foto" className="bg-emerald-600 p-3 rounded-2xl hover:bg-emerald-700 shadow-lg active:scale-95 transition-all">
                                    <SvgIcon name="download" className="w-5 h-5" />
                                </button>
                                <button onClick={downloadPdf} title="Baixar PDF" className="bg-red-600 p-3 rounded-2xl hover:bg-red-700 shadow-lg active:scale-95 transition-all">
                                    <SvgIcon name="pdf" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[450px_1fr] gap-8">
                        <section className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                                <h2 className="text-[11px] font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                                    <SvgIcon name="leaf" className="text-emerald-600 w-4 h-4" />
                                    {editingRef ? 'Editando Registro' : 'Lançamento de Dados'}
                                </h2>
                                <form onSubmit={handleSave} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Bloco</label>
                                            <select value={formData.nomeBloco} onChange={e => setFormData({...formData, nomeBloco: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-black outline-none">
                                                {LISTA_BLOCOS_PADRAO.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Data Transplante</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 p-4 bg-emerald-50/50 rounded-3xl border border-emerald-100">
                                        <div className="space-y-1">
                                            <label className="text-[8px] font-black text-emerald-700 uppercase ml-1">Área Total m²</label>
                                            <input type="number" value={formData.areaM2} onChange={e => setFormData({...formData, areaM2: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black outline-none" placeholder="Ex: 10000" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[8px] font-black text-emerald-700 uppercase ml-1">Área Total ha</label>
                                            <input type="number" step="0.01" value={formData.areaHectares} onChange={e => setFormData({...formData, areaHectares: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black outline-none" placeholder="Ex: 1.0" />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-black text-emerald-700 uppercase tracking-widest px-1">Variedades</p>
                                        {formData.variedadesList.map((v) => (
                                            <div key={v.id} className="p-4 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                                                <div className="flex justify-between items-center">
                                                    <select value={v.nome} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, nome: e.target.value} : item)})} className="bg-transparent text-xs font-black uppercase outline-none text-emerald-900">
                                                        {LISTA_VARIEDADES.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                    {formData.variedadesList.length > 1 && (
                                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: formData.variedadesList.filter(item => item.id !== v.id)})} className="text-red-400 p-1 hover:bg-red-50 rounded-lg transition-colors"><SvgIcon name="trash" className="w-4 h-4"/></button>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div><p className="text-[7px] font-black text-slate-400 uppercase mb-1 text-center">Bandejas</p><input type="number" value={v.bandejas} onChange={e => handleBandejasChange(v.id, e.target.value)} className="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-center outline-none" placeholder="0" /></div>
                                                    <div><p className="text-[7px] font-black text-blue-600 uppercase mb-1 text-center">Mudas</p><div className="w-full p-2 bg-blue-50 text-blue-700 border border-blue-100 rounded-xl text-[10px] font-black text-center h-[34px] flex items-center justify-center">{formatNum(v.totalMudas)}</div></div>
                                                    <div><p className="text-[7px] font-black text-emerald-600 uppercase mb-1 text-center">Plantado</p><input type="number" value={v.transplantadoVariedade} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, transplantadoVariedade: e.target.value} : item)})} className="w-full p-2 bg-white border border-emerald-100 rounded-xl text-xs font-bold text-center outline-none" placeholder="0" /></div>
                                                </div>
                                            </div>
                                        ))}
                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: [...formData.variedadesList, { id: Math.random().toString(36).substr(2, 9), nome: 'Syngenta BRO', bandejas: '', totalMudas: '', transplantadoVariedade: '' }]})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-[9px] font-black text-slate-400 uppercase hover:bg-emerald-50 transition-all">+ Adicionar Variedade</button>
                                    </div>

                                    <div className="bg-emerald-900/5 p-4 rounded-[2rem] border border-emerald-100 space-y-4">
                                        <div className="flex items-center gap-2 px-1"><SvgIcon name="droplet" className="text-emerald-700 w-3 h-3" /><p className="text-[8px] font-black text-emerald-800 uppercase tracking-widest">Infraestrutura Lado A</p></div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="col-span-2"><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Mudas Efetuadas (un)</p><input type="number" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black outline-none" placeholder="Total Lado A" /></div>
                                            <div><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Microasp.</p><input type="number" value={formData.microA} onChange={e => setFormData({...formData, microA: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde" /></div>
                                            <div><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Aspersor</p><input type="number" value={formData.asperA} onChange={e => setFormData({...formData, asperA: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde" /></div>
                                            <div className="col-span-2"><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Total Linhas</p><input type="number" value={formData.linhasA} onChange={e => setFormData({...formData, linhasA: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde Linhas Lado A" /></div>
                                        </div>
                                    </div>

                                    <div className="bg-emerald-900/5 p-4 rounded-[2rem] border border-emerald-100 space-y-4">
                                        <div className="flex items-center gap-2 px-1"><SvgIcon name="droplet" className="text-emerald-700 w-3 h-3" /><p className="text-[8px] font-black text-emerald-800 uppercase tracking-widest">Infraestrutura Lado B</p></div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="col-span-2"><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Mudas Efetuadas (un)</p><input type="number" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full p-3 bg-white border border-emerald-100 rounded-2xl text-xs font-black outline-none" placeholder="Total Lado B" /></div>
                                            <div><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Microasp.</p><input type="number" value={formData.microB} onChange={e => setFormData({...formData, microB: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde" /></div>
                                            <div><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Aspersor</p><input type="number" value={formData.asperB} onChange={e => setFormData({...formData, asperB: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde" /></div>
                                            <div className="col-span-2"><p className="text-[7px] font-black text-slate-400 uppercase mb-1 ml-1">Total Linhas</p><input type="number" value={formData.linhasB} onChange={e => setFormData({...formData, linhasB: e.target.value})} className="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-center" placeholder="Qtde Linhas Lado B" /></div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-lg">
                                        <div className="flex justify-between items-center mb-1"><p className="text-[9px] font-black uppercase text-emerald-400 tracking-widest">Efetivo Total</p><SvgIcon name="target" className="w-4 h-4 text-emerald-400" /></div>
                                        <p className="text-3xl font-black">{formatNum(calcGeral.totalEfetivo)} <span className="text-sm text-slate-400 font-bold">mudas</span></p>
                                    </div>

                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                                            <div className="flex justify-between items-center mb-2"><label className="text-[9px] font-black text-orange-700 uppercase">Morte Bandeja</label><span className="text-[10px] font-black text-orange-600">{calcGeral.percPlantio}%</span></div>
                                            <input type="number" value={formData.perdaPlantio} onChange={e => setFormData({...formData, perdaPlantio: e.target.value})} className="w-full p-3 bg-white border border-orange-200 rounded-2xl text-xs font-black outline-none" placeholder="Mudas descartadas" />
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-3xl border border-red-100">
                                            <div className="flex justify-between items-center mb-2"><label className="text-[9px] font-black text-red-700 uppercase">Morte no Campo</label><span className="text-[10px] font-black text-red-600">{calcGeral.percCampo}%</span></div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="number" value={formData.perdaContagemA} onChange={e => setFormData({...formData, perdaContagemA: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Perda Lado A" />
                                                <input type="number" value={formData.perdaContagemB} onChange={e => setFormData({...formData, perdaContagemB: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center" placeholder="Perda Lado B" />
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-[#062C1B] text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl hover:bg-emerald-950 active:scale-95 transition-all">{editingRef ? "Atualizar" : "Salvar no Histórico"}</button>
                                </form>
                            </div>
                        </section>

                        <section className="space-y-6">
                            {blocosData.length === 0 ? (
                                <div className="p-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 text-slate-300 font-black uppercase text-xs tracking-widest">Sem Histórico de Registros</div>
                            ) : (
                                [...blocosData].reverse().map(bloco => (
                                    <div key={bloco.id} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-md overflow-hidden">
                                        <div className="bg-[#062C1B] p-5 text-white px-8 flex justify-between items-center">
                                            <h3 className="font-black text-base uppercase tracking-widest flex items-center gap-2"><span className="w-2 h-6 bg-emerald-400 rounded-full"></span>{bloco.nome}</h3>
                                            <div className="px-3 py-1 bg-emerald-900/50 rounded-lg text-[9px] font-black uppercase tracking-widest">Ativo</div>
                                        </div>
                                        <div className="p-6 space-y-8">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} />
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {showExportTemplate && (
                        <div id="export-container">
                            <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-200">
                                <div className="text-center mb-10 border-b-2 border-emerald-900/10 pb-8">
                                    <img src={NEW_LOGO_URL} className="h-20 mx-auto mb-4" crossOrigin="anonymous" />
                                    <h1 className="font-black uppercase text-2xl text-[#062C1B] leading-none mb-2">Relatório de Mortalidade</h1>
                                    <p className="text-xs text-emerald-600 font-bold uppercase tracking-[0.2em]">Fazenda Oásis</p>
                                </div>
                                <div className="space-y-10">
                                    {blocosData.map(bloco => (
                                        <div key={bloco.id} className="space-y-6">
                                            {bloco.registros.map(reg => (
                                                <RegistroCard key={reg.id} reg={reg} blocoNome={bloco.nome} isExport={true} />
                                            ))}
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-12 pt-6 border-t-2 border-slate-100 text-center">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Controle Digital Oásis • Gerado em {new Date().toLocaleDateString('pt-PT')}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
