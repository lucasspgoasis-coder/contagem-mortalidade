<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Registro de Mortalidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            width: 1000px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const NEW_LOGO_URL = "https://i.imgur.com/wEozr34.png";
        const LISTA_BLOCOS_PADRAO = Array.from({ length: 10 }, (_, i) => `BLOCO ${String(i + 1).padStart(2, '0')}`);
        const LISTA_VARIEDADES = ["Syngenta BRO", "Master Tsv", "Pharlap", "Jiraya F1", "OUTRA..."];
        const MUDAS_POR_BANDEJA = 200;

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-10 10Z" />,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [blocosData, setBlocosData] = useState([]);
            const [editingRef, setEditingRef] = useState(null);
            const [showExportTemplate, setShowExportTemplate] = useState(false);

            const initialVariedadeState = {
                id: Math.random().toString(36).substr(2, 9),
                nome: 'Syngenta BRO',
                bandejas: '',
                totalMudas: '',
                totalTransplantado: ''
            };

            const [formData, setFormData] = useState({
                nomeBloco: 'BLOCO 01',
                dataContagem: new Date().toISOString().split('T')[0],
                perdaPlantio: '',
                perdaContagemA: '',
                perdaContagemB: '',
                variedadesList: [{...initialVariedadeState}]
            });

            useEffect(() => {
                const localData = localStorage.getItem('oasis_mortalidade_v10');
                if (localData) setBlocosData(JSON.parse(localData));
            }, []);

            const saveToLocal = (data) => {
                localStorage.setItem('oasis_mortalidade_v10', JSON.stringify(data));
                setBlocosData(data);
            };

            const handleBandejasChange = (id, valor) => {
                const numBandejas = parseInt(valor) || 0;
                setFormData(prev => ({
                    ...prev,
                    variedadesList: prev.variedadesList.map(v => 
                        v.id === id ? { 
                            ...v, 
                            bandejas: valor, 
                            totalMudas: valor === '' ? '' : (numBandejas * MUDAS_POR_BANDEJA).toString() 
                        } : v
                    )
                }));
            };

            const calcGeral = useMemo(() => {
                let mudasTotais = 0;
                let transplantadoTotal = 0;
                formData.variedadesList.forEach(v => { 
                    mudasTotais += (parseInt(v.totalMudas) || 0);
                    transplantadoTotal += (parseInt(v.totalTransplantado) || 0);
                });

                const pP = parseInt(formData.perdaPlantio) || 0;
                const pA = parseInt(formData.perdaContagemA) || 0;
                const pB = parseInt(formData.perdaContagemB) || 0;
                
                const percPlantio = mudasTotais > 0 ? ((pP / mudasTotais) * 100).toFixed(1) : 0;
                const percCampo = transplantadoTotal > 0 ? (((pA + pB) / transplantadoTotal) * 100).toFixed(1) : 0;
                
                return { mudasTotais, transplantadoTotal, percPlantio, percCampo, pP, pA, pB };
            }, [formData]);

            const handleSave = (e) => {
                e.preventDefault();
                const novoRegistro = {
                    id: editingRef ? editingRef.regId : Date.now().toString(),
                    dataContagem: formData.dataContagem,
                    mudasTotais: calcGeral.mudasTotais,
                    totalTransplantado: calcGeral.transplantadoTotal,
                    perdaPlantio: calcGeral.pP,
                    perdaA: calcGeral.pA,
                    perdaB: calcGeral.pB,
                    percPlantio: calcGeral.percPlantio,
                    percCampo: calcGeral.percCampo,
                    variedades: formData.variedadesList.map(v => ({...v}))
                };

                let updated = [...blocosData];
                if (editingRef) {
                    updated = updated.map(b => b.nome === editingRef.blocoNome ? { ...b, registros: b.registros.filter(r => r.id !== editingRef.regId) } : b);
                }

                const bIdx = updated.findIndex(b => b.nome === formData.nomeBloco);
                if (bIdx !== -1) updated[bIdx].registros.push(novoRegistro);
                else updated.push({ id: Date.now().toString(), nome: formData.nomeBloco, registros: [novoRegistro] });

                saveToLocal(updated.filter(b => b.registros.length > 0));
                setEditingRef(null);
                setFormData(prev => ({
                    ...prev,
                    perdaPlantio: '',
                    perdaContagemA: '',
                    perdaContagemB: '',
                    variedadesList: [{ ...initialVariedadeState, id: Math.random().toString(36).substr(2, 9) }]
                }));
            };

            const downloadJpeg = async () => {
                setShowExportTemplate(true);
                setTimeout(async () => {
                    const element = document.getElementById('export-container');
                    if (element) {
                        const canvas = await html2canvas(element, { scale: 2 });
                        const link = document.createElement('a');
                        link.download = `Oasis_Mortalidade.jpg`;
                        link.href = canvas.toDataURL('image/jpeg', 0.9);
                        link.click();
                        setShowExportTemplate(false);
                    }
                }, 500);
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-[#062C1B] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={NEW_LOGO_URL} className="h-10" />
                                <div>
                                    <h1 className="font-black uppercase text-lg leading-none tracking-tight">Fazenda Oásis</h1>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Controle de Mortalidade</p>
                                </div>
                            </div>
                            <button onClick={downloadJpeg} className="bg-red-600 p-3 rounded-2xl hover:bg-red-700 shadow-lg transition-all active:scale-95">
                                <SvgIcon name="download" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 grid lg:grid-cols-[400px_1fr] gap-8">
                        {/* COLUNA ESQUERDA: ENTRADA */}
                        <section className="space-y-6">
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                                <h2 className="text-[11px] font-black uppercase text-slate-400 mb-6 flex items-center gap-2">
                                    <SvgIcon name="leaf" className="text-emerald-600 w-4 h-4" />
                                    Novo Lançamento
                                </h2>

                                <form onSubmit={handleSave} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Bloco</label>
                                            <select value={formData.nomeBloco} onChange={e => setFormData({...formData, nomeBloco: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-black outline-none focus:ring-2 focus:ring-emerald-500/20">
                                                {LISTA_BLOCOS_PADRAO.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase ml-1">Data</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold outline-none" />
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-[9px] font-black text-emerald-700 uppercase tracking-widest px-1">Dados por Variedade</p>
                                        {formData.variedadesList.map((v) => (
                                            <div key={v.id} className="p-4 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                                                <div className="flex justify-between items-center px-1">
                                                    <select value={v.nome} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, nome: e.target.value} : item)})} className="bg-transparent text-xs font-black uppercase outline-none text-emerald-900 cursor-pointer">
                                                        {LISTA_VARIEDADES.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                    {formData.variedadesList.length > 1 && (
                                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: formData.variedadesList.filter(item => item.id !== v.id)})} className="text-red-400 p-1 hover:bg-red-50 rounded-lg transition-colors"><SvgIcon name="trash" className="w-4 h-4"/></button>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-3 gap-3">
                                                    <div className="text-center">
                                                        <p className="text-[8px] font-black text-slate-400 uppercase mb-1.5">Bandejas</p>
                                                        <input type="number" placeholder="0" value={v.bandejas} onChange={e => handleBandejasChange(v.id, e.target.value)} className="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-center outline-none focus:border-emerald-500" />
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[8px] font-black text-slate-400 uppercase mb-1.5">Mudas Totais</p>
                                                        <input type="number" readOnly value={v.totalMudas} className="w-full p-2.5 bg-blue-50 text-blue-700 border border-blue-100 rounded-xl text-xs font-black text-center outline-none" />
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[8px] font-black text-emerald-500 uppercase mb-1.5">Transplantado</p>
                                                        <input type="number" placeholder="0" value={v.totalTransplantado} onChange={e => setFormData({...formData, variedadesList: formData.variedadesList.map(item => item.id === v.id ? {...item, totalTransplantado: e.target.value} : item)})} className="w-full p-2.5 bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-xl text-xs font-black text-center outline-none focus:border-emerald-500" />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button type="button" onClick={() => setFormData({...formData, variedadesList: [...formData.variedadesList, { ...initialVariedadeState, id: Math.random().toString(36).substr(2, 9) }]})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-[9px] font-black text-slate-400 uppercase hover:bg-emerald-50 hover:border-emerald-200 hover:text-emerald-500 transition-all">+ Adicionar Variedade</button>
                                    </div>

                                    <div className="space-y-4 pt-5 border-t border-slate-100">
                                        <div className="bg-orange-50 p-4 rounded-3xl border border-orange-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-[9px] font-black text-orange-700 uppercase">Perda no Plantio</label>
                                                <span className="text-[11px] font-black text-orange-600 bg-white px-2 py-0.5 rounded-lg shadow-sm">{calcGeral.percPlantio}%</span>
                                            </div>
                                            <input type="number" value={formData.perdaPlantio} onChange={e => setFormData({...formData, perdaPlantio: e.target.value})} className="w-full p-3 bg-white border border-orange-200 rounded-2xl text-xs font-black outline-none placeholder:font-normal" placeholder="Total de mudas descartadas hoje" />
                                        </div>

                                        <div className="bg-red-50 p-4 rounded-3xl border border-red-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-[9px] font-black text-red-700 uppercase">Perda de Campo (Mortalidade)</label>
                                                <span className="text-[11px] font-black text-red-600 bg-white px-2 py-0.5 rounded-lg shadow-sm">{calcGeral.percCampo}%</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <p className="text-[7px] font-bold text-red-400 uppercase text-center">Lado A</p>
                                                    <input type="number" placeholder="0" value={formData.perdaContagemA} onChange={e => setFormData({...formData, perdaContagemA: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center outline-none focus:border-red-400" />
                                                </div>
                                                <div className="space-y-1">
                                                    <p className="text-[7px] font-bold text-red-400 uppercase text-center">Lado B</p>
                                                    <input type="number" placeholder="0" value={formData.perdaContagemB} onChange={e => setFormData({...formData, perdaContagemB: e.target.value})} className="w-full p-3 bg-white border border-red-200 rounded-2xl text-xs font-black text-center outline-none focus:border-red-400" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full py-4 bg-[#062C1B] text-white rounded-[1.5rem] font-black uppercase text-xs tracking-widest shadow-xl hover:bg-emerald-950 transition-all transform active:scale-95">
                                        {editingRef ? "Atualizar Bloco" : "Salvar Registro"}
                                    </button>
                                </form>
                            </div>
                        </section>

                        {/* COLUNA DIREITA: HISTÓRICO VISUAL (FLASH CARDS) */}
                        <section className="space-y-5">
                            {blocosData.length === 0 ? (
                                <div className="p-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 text-slate-300 font-black uppercase text-xs flex flex-col items-center gap-4">
                                    <div className="p-5 bg-slate-50 rounded-full text-slate-200"><SvgIcon name="leaf" className="w-10 h-10" /></div>
                                    Aguardando Lançamentos
                                </div>
                            ) : (
                                [...blocosData].reverse().map(bloco => (
                                    <div key={bloco.id} className="bg-white rounded-[2.5rem] border border-slate-200 shadow-md overflow-hidden hover:shadow-lg transition-shadow">
                                        <div className="bg-[#062C1B] p-5 text-white px-8 flex justify-between items-center">
                                            <h3 className="font-black text-sm uppercase tracking-[0.2em]">{bloco.nome}</h3>
                                            <div className="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold uppercase">Histórico</div>
                                        </div>
                                        <div className="p-6 space-y-6">
                                            {bloco.registros.map(reg => (
                                                <div key={reg.id} className="group relative bg-slate-50 rounded-[2rem] p-5 border border-slate-100 hover:border-emerald-100 hover:bg-white transition-all">
                                                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-5 gap-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className="p-3 bg-emerald-100 rounded-2xl text-emerald-700">
                                                                <SvgIcon name="calendar" className="w-5 h-5"/>
                                                            </div>
                                                            <div>
                                                                <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Data do Lançamento</p>
                                                                <p className="text-sm font-black text-slate-800">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="flex gap-4 md:gap-8">
                                                            <div className="text-center md:text-right">
                                                                <p className="text-[8px] font-black text-orange-500 uppercase mb-1">Perda Plantio</p>
                                                                <p className="text-lg font-black text-orange-600 leading-none">{reg.percPlantio}%</p>
                                                            </div>
                                                            <div className="text-center md:text-right">
                                                                <p className="text-[8px] font-black text-red-500 uppercase mb-1">Perda Campo</p>
                                                                <p className="text-lg font-black text-red-600 leading-none">{reg.percCampo}%</p>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* DETALHES DE VARIEDADES NO CARD */}
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5">
                                                        {reg.variedades.map((v, i) => (
                                                            <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                                                <p className="font-black text-[11px] text-emerald-900 uppercase border-b border-emerald-50 pb-2 mb-2">{v.nome}</p>
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <div>
                                                                        <p className="text-[8px] text-slate-400 uppercase font-bold">Mudas Totais</p>
                                                                        <p className="text-xs font-black text-slate-600">{v.totalMudas}</p>
                                                                    </div>
                                                                    <div>
                                                                        <p className="text-[8px] text-emerald-500 uppercase font-bold">Transplantado</p>
                                                                        <p className="text-xs font-black text-emerald-700">{v.totalTransplantado}</p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    {/* RESUMO DE CONTAGEM DE LADOS */}
                                                    <div className="flex justify-between items-center p-4 bg-[#062C1B]/5 rounded-2xl border border-[#062C1B]/10">
                                                        <div className="flex gap-6">
                                                            <div>
                                                                <p className="text-[8px] font-black text-slate-400 uppercase">Perda Lado A</p>
                                                                <p className="text-sm font-black text-slate-700">{reg.perdaA || 0}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-[8px] font-black text-slate-400 uppercase">Perda Lado B</p>
                                                                <p className="text-sm font-black text-slate-700">{reg.perdaB || 0}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => {
                                                                setFormData({
                                                                    nomeBloco: bloco.nome,
                                                                    dataContagem: reg.dataContagem,
                                                                    perdaPlantio: reg.perdaPlantio,
                                                                    perdaContagemA: reg.perdaA,
                                                                    perdaContagemB: reg.perdaB,
                                                                    variedadesList: reg.variedades.map(v => ({...v}))
                                                                });
                                                                setEditingRef({ blocoNome: bloco.nome, regId: reg.id });
                                                                window.scrollTo({ top: 0, behavior: 'smooth' });
                                                            }} className="p-2 text-slate-400 hover:text-orange-500 hover:bg-orange-50 rounded-xl transition-all"><SvgIcon name="edit" className="w-4 h-4"/></button>
                                                            <button onClick={() => saveToLocal(blocosData.map(b => b.nome === bloco.nome ? {...b, registros: b.registros.filter(r => r.id !== reg.id)} : b).filter(b => b.registros.length > 0))} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"><SvgIcon name="trash" className="w-4 h-4"/></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* EXPORTADOR JPEG */}
                    {showExportTemplate && (
                        <div id="export-container">
                            <div className="p-10 bg-white">
                                <div className="flex justify-between items-center border-b-8 border-emerald-900 pb-8 mb-10">
                                    <img src={NEW_LOGO_URL} className="h-16" />
                                    <div className="text-right">
                                        <h2 className="text-3xl font-black uppercase text-emerald-900">Mortalidade Consolidada</h2>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-[0.3em]">Fazenda Oásis</p>
                                    </div>
                                </div>
                                <div className="space-y-8">
                                    {blocosData.map(b => (
                                        <div key={b.id} className="border-2 border-slate-200 rounded-[2.5rem] overflow-hidden">
                                            <div className="bg-emerald-900 text-white p-5 font-black text-sm uppercase tracking-widest">{b.nome}</div>
                                            <div className="p-6">
                                                {b.registros.map(r => (
                                                    <div key={r.id} className="mb-8 last:mb-0 border-b-2 last:border-0 border-slate-100 pb-8">
                                                        <div className="flex justify-between items-end mb-4">
                                                            <span className="text-xs font-black text-slate-400">DATA: {r.dataContagem.split('-').reverse().join('/')}</span>
                                                            <div className="flex gap-10">
                                                                <div className="text-right">
                                                                    <p className="text-[9px] font-black text-orange-500 uppercase">Inicial</p>
                                                                    <p className="text-xl font-black text-orange-600">{r.percPlantio}%</p>
                                                                </div>
                                                                <div className="text-right">
                                                                    <p className="text-[9px] font-black text-red-500 uppercase">Campo</p>
                                                                    <p className="text-xl font-black text-red-600">{r.percCampo}%</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {r.variedades.map((v, i) => (
                                                                <div key={i} className="bg-slate-50 p-4 rounded-2xl">
                                                                    <p className="font-black text-[10px] text-emerald-900 mb-2 uppercase">{v.nome}</p>
                                                                    <p className="text-[9px] font-bold text-slate-500 uppercase">Mudas Totais: <span className="text-slate-800">{v.totalMudas}</span></p>
                                                                    <p className="text-[9px] font-bold text-emerald-600 uppercase">Transplantado: <span className="font-black">{v.totalTransplantado}</span></p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="mt-4 flex gap-6 text-[10px] font-black uppercase text-slate-400">
                                                            <span>Lado A: {r.perdaA || 0}</span>
                                                            <span>Lado B: {r.perdaB || 0}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
