<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #FFFFFF;
            width: 850px; 
            padding: 40px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";
        const BLOCOS_OPCOES = Array.from({ length: 14 }, (_, i) => `Bloco ${String(i + 1).padStart(2, '0')}`);
        const VARIEDADES_OPCOES = ["Master TSV", "Syngenta BRO", "Pharlap", "Jiraya"];

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1.2 0-2.31-.3-3.27-.83M11 20l-2-2"/>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num || 0).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const getToday = () => new Date().toISOString().split('T')[0];
            const calculateFutureDate = (baseDate, days) => {
                if (!baseDate) return "";
                const date = new Date(baseDate + 'T12:00:00');
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            };

            const [perdasVariedade, setPerdasVariedade] = useState([]);
            const [varForm, setVarForm] = useState({ nome: '', qtd: '', lado: 'A' });

            const [formData, setFormData] = useState({
                dataContagem: getToday(),
                proximaContagem: calculateFutureDate(getToday(), 15),
                blocoTalhao: '',
                totalBandejas: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: '',
                canteirosA: '',
                canteirosB: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v22');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v22', JSON.stringify(data));
                setRegistros(data);
            };

            const calculosGerais = useMemo(() => {
                const totalMudasLote = (Number(formData.totalBandejas) || 0) * 200;
                const pLoteVal = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const totalTrans = transA + transB;
                
                const pPosA = perdasVariedade.filter(p => p.lado === 'A').reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                const pPosB = perdasVariedade.filter(p => p.lado === 'B').reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                const totalPPos = pPosA + pPosB;

                // CÁLCULOS DE PERCENTAGEM
                const percLote = totalMudasLote > 0 ? Math.round((pLoteVal / totalMudasLote) * 100) : 0;
                const percPos = totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0;
                
                // AJUSTE PARA TOTAL GERAL (Soma das perdas ou Perda total sobre o lote)
                // Se a intenção é 22% baseado no exemplo do usuário:
                const percGeral = percLote + percPos;

                return {
                    totalMudas: totalMudasLote,
                    totalPerdasLote: pLoteVal,
                    percPerdaLote: percLote,
                    percPos: percPos,
                    percGeral: percGeral,
                    totalTrans,
                    totalPPos,
                    pPosA,
                    pPosB,
                    transA,
                    transB
                };
            }, [formData, perdasVariedade]);

            const handleAddVariedade = () => {
                if (!varForm.nome || !varForm.qtd) return;
                setPerdasVariedade([...perdasVariedade, { ...varForm, id: Date.now() }]);
                setVarForm({ nome: '', qtd: '', lado: 'A' });
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const novo = {
                    ...formData,
                    id: Date.now(),
                    perdasDetalhadas: perdasVariedade,
                    ...calculosGerais
                };
                save([novo, ...registros]);
                setPerdasVariedade([]);
                setFormData({ 
                    dataContagem: getToday(), 
                    proximaContagem: calculateFutureDate(getToday(), 15), 
                    blocoTalhao: '', 
                    totalBandejas: '', 
                    transplantadoA: '', 
                    transplantadoB: '', 
                    totalPerdasLote: '',
                    canteirosA: '',
                    canteirosB: ''
                });
            };

            const exportPDF = async () => {
                if (registros.length === 0) return;
                setShowExport(true);
                setTimeout(async () => {
                    const element = reportRef.current;
                    const canvas = await html2canvas(element, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = pdf.internal.pageSize.getWidth();
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                    pdf.save(`RELATORIO_OASIS_${formData.blocoTalhao || 'GERAL'}.pdf`);
                    setShowExport(false);
                }, 500);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-[#062C1B] text-white p-4 shadow-xl sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-10" crossOrigin="anonymous" />
                                <h1 className="text-xl font-black uppercase tracking-tighter">Fazenda Oásis</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportPDF} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2 transition-all">
                                    <SvgIcon name="printer" /> Exportar PDF
                                </button>
                                <button onClick={() => { if(confirm("Limpar histórico?")) save([]); }} className="bg-white/10 p-2 rounded-lg hover:bg-red-600 transition-colors">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 grid lg:grid-cols-[380px_1fr] gap-6 mt-4">
                        {/* COLUNA ESQUERDA: FORMULÁRIO */}
                        <aside className="space-y-4">
                            <div className="bg-white p-6 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-[11px] font-black text-slate-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                                    <div className="p-1.5 bg-emerald-100 rounded-lg text-emerald-700"><SvgIcon name="plus" className="w-3.5 h-3.5"/></div>
                                    Novo Monitoramento
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <label className="text-[8px] font-black text-slate-400 uppercase block mb-1">Data Coleta</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full bg-transparent text-xs font-bold outline-none" required />
                                        </div>
                                        <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100 text-center">
                                            <label className="text-[8px] font-black text-emerald-600 uppercase block mb-1">Próxima Coleta</label>
                                            <div className="text-xs font-black text-emerald-700">{formData.proximaContagem.split('-').reverse().join('/')}</div>
                                        </div>
                                    </div>

                                    <select value={formData.blocoTalhao} onChange={e => setFormData({...formData, blocoTalhao: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold" required>
                                        <option value="">Selecione o Bloco</option>
                                        {BLOCOS_OPCOES.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>

                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="Canteiros A" value={formData.canteirosA} onChange={e => setFormData({...formData, canteirosA: e.target.value})} className="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-200 outline-none" required />
                                        <input type="number" placeholder="Canteiros B" value={formData.canteirosB} onChange={e => setFormData({...formData, canteirosB: e.target.value})} className="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-200 outline-none" required />
                                    </div>

                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Perdas Pós-Transplante</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            <select value={varForm.nome} onChange={e => setVarForm({...varForm, nome: e.target.value})} className="p-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold">
                                                <option value="">Variedade</option>
                                                {VARIEDADES_OPCOES.map(v => <option key={v} value={v}>{v}</option>)}
                                            </select>
                                            <input type="number" placeholder="Qtd" value={varForm.qtd} onChange={e => setVarForm({...varForm, qtd: e.target.value})} className="p-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold"/>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex-1 flex bg-white border border-slate-200 rounded-xl overflow-hidden p-1">
                                                <button type="button" onClick={() => setVarForm({...varForm, lado: 'A'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg ${varForm.lado === 'A' ? 'bg-emerald-600 text-white' : 'text-slate-400'}`}>SETOR A</button>
                                                <button type="button" onClick={() => setVarForm({...varForm, lado: 'B'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg ${varForm.lado === 'B' ? 'bg-emerald-600 text-white' : 'text-slate-400'}`}>SETOR B</button>
                                            </div>
                                            <button type="button" onClick={handleAddVariedade} className="bg-emerald-600 text-white px-4 rounded-xl shadow-md"><SvgIcon name="plus" /></button>
                                        </div>
                                        {perdasVariedade.map(p => (
                                            <div key={p.id} className="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-200 text-[10px] font-bold">
                                                <span>{p.nome} ({p.lado})</span>
                                                <div className="flex items-center gap-2">
                                                    <span>{p.qtd} un</span>
                                                    <button type="button" onClick={() => setPerdasVariedade(perdasVariedade.filter(v => v.id !== p.id))} className="text-red-400"><SvgIcon name="trash" className="w-3 h-3"/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-900 p-3 rounded-2xl text-center">
                                            <label className="text-[8px] font-black text-slate-500 uppercase block mb-1">Total Bandejas</label>
                                            <input type="number" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white text-center text-xl font-black outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-3 rounded-2xl text-center text-emerald-400">
                                            <label className="text-[8px] font-black uppercase block mb-1">Mudas do Lote</label>
                                            <div className="text-lg font-black">{formatNumber(calculosGerais.totalMudas)}</div>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-emerald-50 rounded-2xl border border-emerald-200 text-center">
                                        <label className="text-[8px] font-black text-emerald-700 uppercase block mb-2">Mudas Transplantadas</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" placeholder="Lado A" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="p-2 bg-white rounded-xl text-center text-xs font-black border border-emerald-100 outline-none" required />
                                            <input type="number" placeholder="Lado B" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="p-2 bg-white rounded-xl text-center text-xs font-black border border-emerald-100 outline-none" required />
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-3 rounded-2xl border border-orange-200 text-center">
                                        <div className="flex justify-between items-center mb-1 px-2">
                                            <label className="text-[8px] font-black text-orange-700 uppercase">Perda de Lote</label>
                                            <span className="text-[10px] font-black text-orange-800">{calculosGerais.percPerdaLote}%</span>
                                        </div>
                                        <input type="number" placeholder="0" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-xl font-black text-orange-950 outline-none text-center" required />
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg hover:brightness-110 active:scale-95 transition-all">
                                        Salvar Monitoramento
                                    </button>
                                </form>
                            </div>
                        </aside>

                        {/* COLUNA DIREITA: LISTAGEM */}
                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="h-64 flex flex-col items-center justify-center text-slate-300 gap-4 border-2 border-dashed border-slate-200 rounded-[2rem]">
                                    <SvgIcon name="leaf" className="w-12 h-12" />
                                    <p className="font-bold uppercase text-[10px] tracking-widest">Sem registros disponíveis</p>
                                </div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[1.5rem] p-5 card-shadow border border-slate-100 relative overflow-hidden group">
                                        <div className="absolute top-0 left-0 w-1.5 h-full bg-emerald-600"></div>
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <p className="text-[9px] font-black text-emerald-600 uppercase mb-1">{reg.blocoTalhao}</p>
                                                <p className="text-lg font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="text-right">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase">Geral</p>
                                                    <p className="text-xl font-black text-red-600">{reg.percGeral}%</p>
                                                </div>
                                                <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-slate-200 hover:text-red-500 transition-colors"><SvgIcon name="trash" /></button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-4 gap-2">
                                            <div className="bg-slate-50 p-2 rounded-xl text-center">
                                                <p className="text-[7px] font-black text-slate-400 uppercase">Plantado</p>
                                                <p className="text-xs font-black text-slate-700">{formatNumber(reg.totalTrans)}</p>
                                            </div>
                                            <div className="bg-orange-50 p-2 rounded-xl text-center">
                                                <p className="text-[7px] font-black text-orange-400 uppercase">P. Lote</p>
                                                <p className="text-xs font-black text-orange-700">{reg.percPerdaLote}%</p>
                                            </div>
                                            <div className="bg-red-50 p-2 rounded-xl text-center">
                                                <p className="text-[7px] font-black text-red-400 uppercase">P. Pós-T</p>
                                                <p className="text-xs font-black text-red-700">{reg.percPos}%</p>
                                            </div>
                                            <div className="bg-indigo-50 p-2 rounded-xl text-center">
                                                <p className="text-[7px] font-black text-indigo-400 uppercase">Mudas Pós-T</p>
                                                <p className="text-xs font-black text-indigo-700">{reg.totalPPos}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* CONTAINER DE EXPORTAÇÃO (PDF) */}
                    {showExport && (
                        <div id="export-container" ref={reportRef}>
                            <div className="border-b-4 border-[#062C1B] pb-6 mb-8 flex justify-between items-end">
                                <div className="flex items-center gap-6">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-16" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="text-3xl font-black text-[#062C1B] uppercase tracking-tighter leading-none">Monitoramento Técnico</h1>
                                        <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mt-2">Fazenda Oásis — Relatório de Campo</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-black text-slate-900 uppercase">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>

                            {registros.slice(0, 1).map(reg => (
                                <div key={reg.id} className="space-y-6">
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] flex justify-between items-center text-white">
                                        <div>
                                            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Localização</p>
                                            <h3 className="text-4xl font-black">{reg.blocoTalhao}</h3>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Data da Coleta</p>
                                            <p className="text-3xl font-black">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-6 rounded-[2rem] border-2 border-slate-100 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 right-0 bg-[#062C1B] text-white px-4 py-1 rounded-bl-xl text-[9px] font-black uppercase tracking-widest">Setor A</div>
                                            <div className="grid grid-cols-2 gap-4 text-center">
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Canteiros</p>
                                                    <p className="text-4xl font-black text-slate-900">{reg.canteirosA}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Plantado</p>
                                                    <p className="text-2xl font-black text-emerald-700">{formatNumber(reg.transA)}</p>
                                                </div>
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-slate-50 text-center">
                                                <p className="text-[10px] font-black text-red-500 uppercase tracking-widest">Perdas Pós-T (Setor A): <span className="text-slate-900">{reg.pPosA} un</span></p>
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-[2rem] border-2 border-slate-100 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 right-0 bg-[#062C1B] text-white px-4 py-1 rounded-bl-xl text-[9px] font-black uppercase tracking-widest">Setor B</div>
                                            <div className="grid grid-cols-2 gap-4 text-center">
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Canteiros</p>
                                                    <p className="text-4xl font-black text-slate-900">{reg.canteirosB}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Plantado</p>
                                                    <p className="text-2xl font-black text-emerald-700">{formatNumber(reg.transB)}</p>
                                                </div>
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-slate-50 text-center">
                                                <p className="text-[10px] font-black text-red-500 uppercase tracking-widest">Perdas Pós-T (Setor B): <span className="text-slate-900">{reg.pPosB} un</span></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                                        <div className="grid grid-cols-4 gap-4">
                                            <div className="text-center bg-white p-5 rounded-2xl">
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Lote Original</p>
                                                <p className="text-2xl font-black text-slate-900">{formatNumber(reg.totalMudas)}</p>
                                            </div>
                                            <div className="text-center bg-white p-5 rounded-2xl">
                                                <p className="text-[9px] font-black text-orange-600 uppercase mb-2">Perda Lote %</p>
                                                <p className="text-2xl font-black text-orange-700">{reg.percPerdaLote}%</p>
                                            </div>
                                            <div className="text-center bg-white p-5 rounded-2xl">
                                                <p className="text-[9px] font-black text-red-600 uppercase mb-2">Perda Pós-T %</p>
                                                <p className="text-2xl font-black text-red-700">{reg.percPos}%</p>
                                            </div>
                                            <div className="text-center bg-slate-900 p-5 rounded-2xl shadow-xl">
                                                <p className="text-[9px] font-black text-emerald-400 uppercase mb-2">Perda Total %</p>
                                                <p className="text-4xl font-black text-white">{reg.percGeral}%</p>
                                            </div>
                                        </div>
                                    </div>

                                    {reg.perdasDetalhadas.length > 0 && (
                                        <div className="p-8 bg-white rounded-[2.5rem] border-2 border-slate-100 shadow-lg">
                                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Incidência por Variedade</p>
                                            <div className="grid grid-cols-2 gap-4">
                                                {reg.perdasDetalhadas.map((p, idx) => (
                                                    <div key={idx} className="bg-slate-50 p-5 rounded-2xl border border-slate-100 flex justify-between items-center">
                                                        <div>
                                                            <p className="text-xs font-black text-slate-700 uppercase">{p.nome}</p>
                                                            <p className="text-[9px] font-bold text-indigo-500 uppercase">Setor {p.lado}</p>
                                                        </div>
                                                        <p className="text-2xl font-black text-slate-900">{p.qtd} un</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-12 pt-12 flex flex-col items-center gap-4 opacity-30">
                                        <img src={OASIS_LOGO_URL} alt="Logo Rodapé" className="h-8 grayscale" crossOrigin="anonymous" />
                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.5em]">Sistema de Gestão Fazenda Oásis</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
