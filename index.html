<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        
        /* Contentor Invisível para Exportação */
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #FFFFFF;
            width: 800px; 
            padding: 40px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Badge Oval com Contorno Perfeito e Centralizado */
        .pct-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            line-height: 1;
            padding: 4px 12px;
            font-weight: 900;
            white-space: nowrap;
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const calculateFutureDate = (baseDate, days) => {
                if (!baseDate) return "";
                const date = new Date(baseDate + 'T12:00:00');
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            };

            const getToday = () => new Date().toISOString().split('T')[0];

            const [formData, setFormData] = useState({
                dataContagem: getToday(),
                proximaContagem: calculateFutureDate(getToday(), 15),
                totalBandejas: '',
                linhasA: '',
                linhasB: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: '',
                perdaPosA: '',
                perdaPosB: ''
            });

            useEffect(() => {
                const next = calculateFutureDate(formData.dataContagem, 15);
                if (next) {
                    setFormData(prev => ({ ...prev, proximaContagem: next }));
                }
            }, [formData.dataContagem]);

            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v3');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v3', JSON.stringify(data));
                setRegistros(data);
            };

            const calculos = useMemo(() => {
                const totalM = (Number(formData.totalBandejas) || 0) * 200;
                const totalPLote = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const pPosA = Number(formData.perdaPosA) || 0;
                const pPosB = Number(formData.perdaPosB) || 0;

                const totalTrans = transA + transB;
                const totalPPos = pPosA + pPosB;
                const perdaAcumulada = totalPLote + totalPPos;

                return {
                    totalMudas: totalM,
                    percPerdaLote: totalM > 0 ? Math.round((totalPLote / totalM) * 100) : 0,
                    percPos: totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0,
                    totalTrans,
                    totalPPos,
                    perdaAcumulada,
                    percGeral: totalM > 0 ? Math.round((perdaAcumulada / totalM) * 100) : 0
                };
            }, [formData]);

            const handleAdd = (e) => {
                e.preventDefault();
                const novo = {
                    ...formData,
                    id: Date.now(),
                    totalMudas: calculos.totalMudas,
                    percPerdaLote: calculos.percPerdaLote,
                    percPos: calculos.percPos,
                    totalTransplantado: calculos.totalTrans,
                    totalPerdasPos: calculos.totalPPos,
                    perdaAcumulada: calculos.perdaAcumulada,
                    percGeral: calculos.percGeral
                };
                save([novo, ...registros]);
                
                const today = getToday();
                setFormData({
                    dataContagem: today,
                    proximaContagem: calculateFutureDate(today, 15),
                    totalBandejas: '',
                    linhasA: '',
                    linhasB: '',
                    transplantadoA: '',
                    transplantadoB: '',
                    totalPerdasLote: '',
                    perdaPosA: '',
                    perdaPosB: ''
                });
            };

            const exportPDF = async () => {
                if (registros.length === 0) return;
                setShowExport(true);
                
                setTimeout(async () => {
                    const canvas = await html2canvas(reportRef.current, { 
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#FFFFFF',
                        windowWidth: 800
                    });
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`RELATORIO_OASIS_${new Date().toLocaleDateString()}.pdf`);
                    
                    setShowExport(false);
                }, 1000);
            };

            return (
                <div className="min-h-screen pb-12 text-slate-900">
                    <header className="bg-[#062C1B] text-white p-4 shadow-xl sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-10" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tighter">Fazenda Oásis</h1>
                                    <p className="text-[8px] text-emerald-400 font-bold uppercase tracking-widest leading-none">Gestão de Produção</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportPDF} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                    <SvgIcon name="printer" /> Exportar PDF
                                </button>
                                <button onClick={() => { if(confirm("Deseja apagar o histórico?")) save([]); }} className="bg-white/10 hover:bg-red-600 text-white p-2 rounded-lg transition-all">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 grid lg:grid-cols-[340px_1fr] gap-6 mt-2">
                        <aside>
                            <div className="bg-white p-5 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-[10px] font-black text-slate-900 uppercase mb-4 flex items-center gap-2">
                                    <div className="p-1.5 bg-emerald-100 rounded-lg text-emerald-700"><SvgIcon name="trendingDown" className="w-3.5 h-3.5"/></div>
                                    Nova Entrada
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-3">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                                            <label className="text-[8px] font-black text-slate-400 uppercase block mb-1">Referência</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full bg-transparent text-[11px] font-bold outline-none" required />
                                        </div>
                                        <div className="bg-emerald-50 p-2.5 rounded-xl text-center border border-emerald-100">
                                            <label className="text-[8px] font-black text-emerald-600 uppercase block mb-1">Próxima Contagem</label>
                                            <div className="text-[11px] font-black text-emerald-700">
                                                {formData.proximaContagem ? formData.proximaContagem.split('-').reverse().join('/') : "--/--/--"}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                                            <SvgIcon name="grid" className="w-2.5 h-2.5" /> Estrutura Canteiros
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[8px] font-bold text-slate-500 uppercase block mb-1">Canteiro A (Linhas)</label>
                                                <input type="number" placeholder="0" value={formData.linhasA} onChange={e => setFormData({...formData, linhasA: e.target.value})} className="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-bold text-slate-500 uppercase block mb-1">Canteiro B (Linhas)</label>
                                                <input type="number" placeholder="0" value={formData.linhasB} onChange={e => setFormData({...formData, linhasB: e.target.value})} className="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-900 p-3 rounded-2xl text-center shadow-inner">
                                            <label className="text-[8px] font-black text-slate-500 uppercase block mb-0.5">Bandejas</label>
                                            <input type="number" placeholder="0" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white text-center text-xl font-black outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-3 rounded-2xl text-center flex flex-col justify-center shadow-inner">
                                            <label className="text-[8px] font-black text-emerald-400 uppercase block mb-0.5">Total Mudas</label>
                                            <div className="text-white text-xl font-black">{formatNumber(calculos.totalMudas)}</div>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-slate-50 rounded-2xl border border-slate-100 relative overflow-hidden">
                                        <label className="text-[8px] font-black text-slate-500 uppercase block text-center mb-2 tracking-widest">Volume Transplantado</label>
                                        <div className="absolute left-1/2 top-1/2 -translate-x-1/2 h-8 w-[1px] bg-slate-200 mt-1"></div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="text-center">
                                                <label className="text-[7px] font-bold text-slate-400 uppercase block mb-0.5">Lado A</label>
                                                <input type="number" placeholder="0" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full bg-transparent text-center text-base font-black outline-none" />
                                            </div>
                                            <div className="text-center">
                                                <label className="text-[7px] font-bold text-slate-400 uppercase block mb-0.5">Lado B</label>
                                                <input type="number" placeholder="0" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full bg-transparent text-center text-base font-black outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-orange-50 p-3 rounded-2xl border border-orange-200">
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[8px] font-black text-orange-700 uppercase">Perda Transp.</label>
                                            <div className="flex items-center h-full">
                                                <span className="pct-badge bg-orange-200 text-orange-800 text-[10px]">{calculos.percPerdaLote}%</span>
                                            </div>
                                        </div>
                                        <input type="number" placeholder="0" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-xl text-center font-black text-orange-900 outline-none" required />
                                    </div>

                                    <div className="bg-red-50 p-3 rounded-2xl border border-red-200 space-y-2 relative overflow-hidden">
                                        <div className="flex justify-between items-center border-b border-red-200 pb-1.5">
                                            <label className="text-[8px] font-black text-red-700 uppercase">Perdas Pós-T.</label>
                                            <div className="flex items-center h-full">
                                                <span className="pct-badge bg-red-200 text-red-800 text-[10px]">{calculos.percPos}% Geral</span>
                                            </div>
                                        </div>
                                        <div className="absolute left-1/2 bottom-3 -translate-x-1/2 h-8 w-[1px] bg-red-200"></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="text-center">
                                                <label className="text-[7px] font-bold text-red-500 uppercase block mb-0.5">Lado A</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosA} onChange={e => setFormData({...formData, perdaPosA: e.target.value})} className="w-full bg-transparent text-center text-base font-black text-red-900 outline-none" />
                                            </div>
                                            <div className="text-center">
                                                <label className="text-[7px] font-bold text-red-500 uppercase block mb-0.5">Lado B</label>
                                                <input type="number" placeholder="0" value={formData.perdaPosB} onChange={e => setFormData({...formData, perdaPosB: e.target.value})} className="w-full bg-transparent text-center text-base font-black text-red-900 outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                                        <SvgIcon name="check" /> Salvar Registro
                                    </button>
                                </form>
                            </div>
                        </aside>

                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="bg-white p-12 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                                    <p className="text-slate-400 font-bold uppercase text-[9px] tracking-widest">Nenhum dado cadastrado.</p>
                                </div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[2rem] p-6 card-shadow border border-slate-200 relative overflow-hidden transition-all hover:border-emerald-300">
                                        <div className="absolute top-0 left-0 w-2 h-full bg-emerald-600"></div>
                                        
                                        <div className="flex justify-between items-center mb-6">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-slate-100 p-2 rounded-xl text-slate-600"><SvgIcon name="calendar" className="w-5 h-5"/></div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Entrada de Campo</p>
                                                    <p className="text-lg font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className="text-right">
                                                    <p className="text-[8px] font-black text-emerald-500 uppercase leading-none">Próxima Contagem</p>
                                                    <p className="text-xs font-black text-emerald-800">{reg.proximaContagem ? reg.proximaContagem.split('-').reverse().join('/') : "--/--/--"}</p>
                                                </div>
                                                <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-slate-300 hover:text-red-500 transition-colors p-1.5">
                                                    <SvgIcon name="trash" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                            <div className="bg-slate-900 text-white rounded-[1.5rem] p-4 text-center">
                                                <p className="text-[8px] font-black text-slate-500 uppercase mb-1">Lote Mudas</p>
                                                <p className="text-2xl font-black leading-none">{formatNumber(reg.totalMudas)}</p>
                                                <p className="text-[8px] font-bold text-slate-500 mt-2 uppercase">{reg.totalBandejas} BDJ</p>
                                            </div>

                                            <div className="md:col-span-3 bg-white border border-slate-100 rounded-[1.5rem] overflow-hidden grid grid-cols-2 relative">
                                                {/* Divisor vertical */}
                                                <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-[70%] w-[1px] bg-slate-100 z-10"></div>
                                                
                                                <div className="bg-emerald-50 p-4 flex flex-col items-center justify-center border-r border-slate-100 relative">
                                                    <p className="text-[9px] font-black text-emerald-600 uppercase mb-2 tracking-widest">Total Transplantado</p>
                                                    <p className="text-3xl font-black text-emerald-900 mb-2 leading-none">{formatNumber(reg.totalTransplantado)}</p>
                                                    <div className="flex gap-6 w-full justify-center">
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-emerald-600 uppercase mb-0.5">Lado A</p>
                                                            <p className="text-sm font-black text-emerald-800 leading-none">{formatNumber(reg.transplantadoA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-emerald-600 uppercase mb-0.5">Lado B</p>
                                                            <p className="text-sm font-black text-emerald-800 leading-none">{formatNumber(reg.transplantadoB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-red-50 p-4 flex flex-col items-center justify-center relative">
                                                    <div className="flex items-center gap-2 mb-2 h-6">
                                                        <p className="text-[9px] font-black text-red-600 uppercase tracking-widest">Perdas Pós-T.</p>
                                                        <span className="pct-badge bg-red-200 text-red-800 text-[10px] leading-none self-center">{reg.percPos}%</span>
                                                    </div>
                                                    <p className="text-3xl font-black text-red-900 mb-2 leading-none">{formatNumber(reg.totalPerdasPos)}</p>
                                                    <div className="flex gap-6 w-full justify-center">
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-red-600 uppercase mb-0.5">Lado A</p>
                                                            <p className="text-sm font-black text-red-800 leading-none">{formatNumber(reg.perdaPosA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-red-600 uppercase mb-0.5">Lado B</p>
                                                            <p className="text-sm font-black text-red-800 leading-none">{formatNumber(reg.perdaPosB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <div className="flex justify-between items-center bg-orange-50 px-6 py-4 rounded-2xl border border-orange-100">
                                                <div className="flex items-center gap-3">
                                                    <p className="text-[9px] font-black text-orange-700 uppercase tracking-widest leading-none">Perda Transp.</p>
                                                    <span className="pct-badge bg-orange-200 text-orange-800 text-[10px]">{reg.percPerdaLote}%</span>
                                                </div>
                                                <p className="text-xl font-black text-orange-900 leading-none">{formatNumber(reg.totalPerdasLote)}</p>
                                            </div>

                                            <div className="flex justify-between items-center bg-slate-900 px-6 py-4 rounded-2xl border border-slate-800 shadow-xl">
                                                <div className="flex items-center gap-3">
                                                    <div className="p-1.5 bg-red-500 rounded text-white shadow-lg shadow-red-500/30">
                                                        <SvgIcon name="alert" className="w-3.5 h-3.5" />
                                                    </div>
                                                    <div>
                                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Perda Geral</p>
                                                        <p className="text-[7px] font-bold text-emerald-400 uppercase tracking-widest">Somatório</p>
                                                    </div>
                                                </div>
                                                <div className="text-right flex items-center gap-4">
                                                    <div className="flex flex-col items-end">
                                                        <p className="text-2xl font-black text-white leading-none mb-1">{formatNumber(reg.perdaAcumulada)}</p>
                                                        <p className="text-[7px] font-black text-slate-500 uppercase tracking-tighter">Eficiência: {100 - (reg.percGeral || 0)}%</p>
                                                    </div>
                                                    <div className="pct-badge bg-red-600 text-white min-w-[50px] text-[12px] shadow-lg shadow-red-900/20">
                                                        {reg.percGeral}%
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {showExport && (
                        <div id="export-container" ref={reportRef}>
                            <div className="flex justify-between items-end border-b-4 border-[#062C1B] pb-8 mb-10">
                                <div className="flex items-center gap-8">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-20" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="text-3xl font-black text-[#062C1B] uppercase tracking-tighter leading-none">Gestão de Perdas</h1>
                                        <p className="text-xs font-bold text-emerald-600 uppercase tracking-[0.3em] mt-3">Fazenda Oásis - Relatório Gerencial</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Data de Emissão</p>
                                    <p className="text-xl font-black text-slate-900">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>

                            <div className="space-y-10">
                                {registros.slice(0, 5).map((reg) => (
                                    <div key={reg.id} className="relative bg-white p-8 rounded-[2.5rem] border border-slate-100 mb-8 shadow-sm">
                                        <div className="absolute top-0 left-0 w-3 h-full bg-[#062C1B]"></div>
                                        
                                        <div className="flex justify-between items-center mb-8">
                                            <div>
                                                <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">Referência de Campo</p>
                                                <p className="text-4xl font-black text-slate-900 tracking-tighter">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="text-center bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Lado A</p>
                                                    <p className="text-xl font-black text-slate-900">{reg.linhasA || '0'} L</p>
                                                </div>
                                                <div className="text-center bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Lado B</p>
                                                    <p className="text-xl font-black text-slate-900">{reg.linhasB || '0'} L</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-4 gap-4 mb-8">
                                            <div className="bg-slate-900 rounded-3xl p-6 text-white text-center flex flex-col justify-center border-b-4 border-slate-700">
                                                <p className="text-[9px] font-black text-slate-500 uppercase mb-2 tracking-widest">Lote de Entrada</p>
                                                <p className="text-3xl font-black leading-none">{formatNumber(reg.totalMudas)}</p>
                                                <p className="text-[8px] font-bold text-slate-500 mt-3 uppercase tracking-widest">{reg.totalBandejas} Bandejas</p>
                                            </div>
                                            
                                            <div className="col-span-3 grid grid-cols-2 rounded-3xl overflow-hidden border-2 border-slate-50 relative">
                                                {/* Traço divisor no PDF */}
                                                <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-[60%] w-[1px] bg-slate-200 z-10"></div>
                                                
                                                <div className="bg-emerald-50 p-6 flex flex-col items-center justify-center border-r-2 border-white">
                                                    <p className="text-[10px] font-black text-emerald-600 uppercase mb-3 tracking-widest">Transplantado</p>
                                                    <p className="text-5xl font-black text-emerald-950 mb-5 leading-none">{formatNumber(reg.totalTransplantado)}</p>
                                                    <div className="flex justify-around w-full px-4">
                                                        <div className="text-center">
                                                            <p className="text-[8px] font-black text-emerald-400 uppercase mb-1">Lado A</p>
                                                            <p className="text-2xl font-black text-emerald-800 leading-none">{formatNumber(reg.transplantadoA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[8px] font-black text-emerald-400 uppercase mb-1">Lado B</p>
                                                            <p className="text-2xl font-black text-emerald-800 leading-none">{formatNumber(reg.transplantadoB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-red-50 p-6 flex flex-col items-center justify-center">
                                                    <div className="flex items-center gap-3 mb-3 h-8">
                                                        <p className="text-[10px] font-black text-red-600 uppercase tracking-widest leading-none">Perdas Pós-T.</p>
                                                        <span className="pct-badge bg-red-200 text-red-800 text-xs self-center leading-none">{reg.percPos}%</span>
                                                    </div>
                                                    <p className="text-5xl font-black text-red-950 mb-5 leading-none">{formatNumber(reg.totalPerdasPos)}</p>
                                                    <div className="flex justify-around w-full px-4">
                                                        <div className="text-center">
                                                            <p className="text-[8px] font-black text-red-400 uppercase mb-1">Lado A</p>
                                                            <p className="text-2xl font-black text-red-800 leading-none">{formatNumber(reg.perdaPosA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[8px] font-black text-red-400 uppercase mb-1">Lado B</p>
                                                            <p className="text-2xl font-black text-red-800 leading-none">{formatNumber(reg.perdaPosB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="flex justify-between items-center bg-orange-50 px-8 py-6 rounded-3xl border border-orange-100">
                                                <div className="flex items-center gap-4">
                                                    <p className="text-[10px] font-black text-orange-700 uppercase tracking-widest">Perda Transp.</p>
                                                    <span className="pct-badge bg-orange-200 text-orange-800 text-xs">{reg.percPerdaLote}%</span>
                                                </div>
                                                <p className="text-3xl font-black text-orange-950 leading-none">{formatNumber(reg.totalPerdasLote)}</p>
                                            </div>

                                            <div className="flex justify-between items-center bg-slate-900 px-8 py-6 rounded-3xl border-b-4 border-slate-700 shadow-xl">
                                                <div className="flex flex-col">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Total de Perdas</p>
                                                    <p className="text-[8px] font-bold text-emerald-400 uppercase tracking-widest">Eficiência: {100 - reg.percGeral}%</p>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <p className="text-4xl font-black text-white leading-none tracking-tighter">{formatNumber(reg.perdaAcumulada)}</p>
                                                    <div className="pct-badge bg-red-600 text-white min-w-[60px] text-sm">
                                                        {reg.percGeral}%
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-[#062C1B] rounded-2xl py-3 px-6 text-center mt-6">
                                            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-[0.4em]">
                                                Próxima Contagem: <span className="text-white ml-2">{reg.proximaContagem ? reg.proximaContagem.split('-').reverse().join('/') : "--/--/--"}</span>
                                            </p>
                                        </div>
                                    </div>
                                ))}

                                <div className="mt-12 pt-8 border-t-2 border-slate-200 flex justify-between items-center text-slate-400">
                                    <p className="text-[10px] font-black uppercase tracking-widest">Fazenda Oásis - Gestão Técnica de Produção</p>
                                    <p className="text-[10px] font-bold italic">Doc. Interno - Gerado via Sistema Oásis</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
