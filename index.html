<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Perdas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #FFFFFF;
            width: 850px; 
            padding: 40px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .pct-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            line-height: 1;
            padding: 4px 12px;
            font-weight: 900;
            white-space: nowrap;
            text-align: center;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const BLOCOS_OPCOES = Array.from({ length: 14 }, (_, i) => `Bloco ${String(i + 1).padStart(2, '0')}`);
        const VARIEDADES_OPCOES = ["Master TSV", "Syngenta BRO", "Pharlap", "Jiraya"];

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trendingDown: <><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1.2 0-2.31-.3-3.27-.83M11 20l-2-2"/>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const formatNumber = (num) => Number(num).toLocaleString('pt-BR');

        function App() {
            const [registros, setRegistros] = useState([]);
            const [showExport, setShowExport] = useState(false);
            const reportRef = useRef(null);

            const getToday = () => new Date().toISOString().split('T')[0];
            const calculateFutureDate = (baseDate, days) => {
                if (!baseDate) return "";
                const date = new Date(baseDate + 'T12:00:00');
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            };

            const [perdasVariedade, setPerdasVariedade] = useState([]);
            const [varForm, setVarForm] = useState({ nome: '', customNome: '', qtd: '', lado: 'A' });

            const [formData, setFormData] = useState({
                dataContagem: getToday(),
                proximaContagem: calculateFutureDate(getToday(), 15),
                blocoTalhao: '',
                blocoCustom: '',
                totalBandejas: '',
                transplantadoA: '',
                transplantadoB: '',
                totalPerdasLote: ''
            });

            // Persistência local
            useEffect(() => {
                const saved = localStorage.getItem('oasis_perdas_v9');
                if (saved) setRegistros(JSON.parse(saved));
            }, []);

            const save = (data) => {
                localStorage.setItem('oasis_perdas_v9', JSON.stringify(data));
                setRegistros(data);
            };

            // Cálculo dinâmico das perdas pós-transplantio baseadas na lista de variedades
            const perdasCalculadas = useMemo(() => {
                const somaA = perdasVariedade
                    .filter(p => p.lado === 'A')
                    .reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                const somaB = perdasVariedade
                    .filter(p => p.lado === 'B')
                    .reduce((acc, curr) => acc + Number(curr.qtd || 0), 0);
                
                return { somaA, somaB, total: somaA + somaB };
            }, [perdasVariedade]);

            const calculosGerais = useMemo(() => {
                const totalM = (Number(formData.totalBandejas) || 0) * 200;
                const totalPLote = Number(formData.totalPerdasLote) || 0;
                const transA = Number(formData.transplantadoA) || 0;
                const transB = Number(formData.transplantadoB) || 0;
                const totalTrans = transA + transB;

                const pPosA = perdasCalculadas.somaA;
                const pPosB = perdasCalculadas.somaB;
                const totalPPos = perdasCalculadas.total;
                
                const perdaAcumulada = totalPLote + totalPPos;

                const percPerdaLote = totalM > 0 ? Math.round((totalPLote / totalM) * 100) : 0;
                const percPos = totalTrans > 0 ? Math.round((totalPPos / totalTrans) * 100) : 0;
                
                // Soma direta solicitada: 12% + 10% = 22%
                const percGeral = percPerdaLote + percPos;

                return {
                    totalMudas: totalM,
                    percPerdaLote,
                    percPos,
                    totalTrans,
                    totalPPos,
                    perdaAcumulada,
                    percGeral,
                    pPosA,
                    pPosB
                };
            }, [formData, perdasCalculadas]);

            const handleAddVariedade = () => {
                const nomeFinal = varForm.nome === "Outro" ? varForm.customNome : varForm.nome;
                if (!nomeFinal || !varForm.qtd) return;
                setPerdasVariedade([...perdasVariedade, { 
                    nome: nomeFinal, 
                    qtd: varForm.qtd, 
                    lado: varForm.lado, 
                    id: Date.now() 
                }]);
                setVarForm({ ...varForm, nome: '', customNome: '', qtd: '' });
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const blocoFinal = formData.blocoTalhao === "Outro" ? formData.blocoCustom : formData.blocoTalhao;
                
                const novo = {
                    ...formData,
                    blocoTalhao: blocoFinal,
                    id: Date.now(),
                    perdasDetalhadas: perdasVariedade,
                    totalMudas: calculosGerais.totalMudas,
                    percPerdaLote: calculosGerais.percPerdaLote,
                    percPos: calculosGerais.percPos,
                    totalTransplantado: calculosGerais.totalTrans,
                    totalPerdasPos: calculosGerais.totalPPos,
                    perdaAcumulada: calculosGerais.perdaAcumulada,
                    percGeral: calculosGerais.percGeral,
                    perdaPosA: calculosGerais.pPosA,
                    perdaPosB: calculosGerais.pPosB
                };
                save([novo, ...registros]);
                
                // Reset form
                setPerdasVariedade([]);
                setFormData({
                    dataContagem: getToday(),
                    proximaContagem: calculateFutureDate(getToday(), 15),
                    blocoTalhao: '',
                    blocoCustom: '',
                    totalBandejas: '',
                    transplantadoA: '',
                    transplantadoB: '',
                    totalPerdasLote: ''
                });
            };

            const exportPDF = async () => {
                if (registros.length === 0) return;
                setShowExport(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(reportRef.current, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`OASIS_PERDAS_${new Date().getTime()}.pdf`);
                    setShowExport(false);
                }, 800);
            };

            return (
                <div className="min-h-screen pb-12 text-slate-900">
                    <header className="bg-[#062C1B] text-white p-4 shadow-xl sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-10" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tighter">Fazenda Oásis</h1>
                                    <p className="text-[8px] text-emerald-400 font-bold uppercase tracking-widest leading-none">Gestão de Perdas</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportPDF} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                    <SvgIcon name="printer" /> Exportar PDF
                                </button>
                                <button onClick={() => { if(confirm("Limpar dados?")) save([]); }} className="bg-white/10 hover:bg-red-600 text-white p-2 rounded-lg transition-all">
                                    <SvgIcon name="trash" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 grid lg:grid-cols-[380px_1fr] gap-6 mt-2">
                        {/* FORMULÁRIO DE ENTRADA */}
                        <aside className="space-y-4">
                            <div className="bg-white p-6 rounded-[2rem] card-shadow border border-slate-200">
                                <h2 className="text-[10px] font-black text-slate-900 uppercase mb-5 flex items-center gap-2">
                                    <div className="p-1.5 bg-emerald-100 rounded-lg text-emerald-700"><SvgIcon name="trendingDown" className="w-3.5 h-3.5"/></div>
                                    Novo Registro de Campo
                                </h2>

                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                                            <label className="text-[8px] font-black text-slate-400 uppercase block mb-1">Data Atual</label>
                                            <input type="date" value={formData.dataContagem} onChange={e => setFormData({...formData, dataContagem: e.target.value})} className="w-full bg-transparent text-[11px] font-bold outline-none" required />
                                        </div>
                                        <div className="bg-emerald-50 p-2.5 rounded-xl text-center border border-emerald-100 flex flex-col justify-center">
                                            <label className="text-[8px] font-black text-emerald-600 uppercase block mb-1">Próxima Visita</label>
                                            <div className="text-[11px] font-black text-emerald-700">
                                                {formData.proximaContagem ? formData.proximaContagem.split('-').reverse().join('/') : "--/--/--"}
                                            </div>
                                        </div>
                                    </div>

                                    {/* SELEÇÃO DO BLOCO */}
                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 space-y-2">
                                        <label className="text-[8px] font-black text-slate-400 uppercase block">Local (Bloco / Talhão)</label>
                                        <select 
                                            value={formData.blocoTalhao} 
                                            onChange={e => setFormData({...formData, blocoTalhao: e.target.value})} 
                                            className="w-full p-2 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none"
                                            required
                                        >
                                            <option value="">Selecione...</option>
                                            {BLOCOS_OPCOES.map(b => <option key={b} value={b}>{b}</option>)}
                                            <option value="Outro">Outro (Manual)</option>
                                        </select>
                                        {formData.blocoTalhao === "Outro" && (
                                            <input 
                                                type="text" 
                                                placeholder="Digite o local manualmente" 
                                                value={formData.blocoCustom} 
                                                onChange={e => setFormData({...formData, blocoCustom: e.target.value})} 
                                                className="w-full p-2 bg-white border border-emerald-300 rounded-xl text-xs font-bold outline-none"
                                                required
                                            />
                                        )}
                                    </div>

                                    {/* LISTAGEM DE VARIEDADES - GERA PERDA PÓS AUTOMÁTICA */}
                                    <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-3">
                                        <div className="flex justify-between items-center">
                                            <div className="text-[8px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-1.5">
                                                <SvgIcon name="leaf" className="w-3 h-3" /> Detalhar Perda Pós (Setor A/B)
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-2">
                                            <div className="grid grid-cols-2 gap-2">
                                                <select 
                                                    value={varForm.nome} 
                                                    onChange={e => setVarForm({...varForm, nome: e.target.value})} 
                                                    className="p-2 bg-white border border-indigo-200 rounded-xl text-[10px] font-bold outline-none"
                                                >
                                                    <option value="">Variedade</option>
                                                    {VARIEDADES_OPCOES.map(v => <option key={v} value={v}>{v}</option>)}
                                                    <option value="Outro">Outra Variedade</option>
                                                </select>
                                                <input type="number" placeholder="Qtd Perdida" value={varForm.qtd} onChange={e => setVarForm({...varForm, qtd: e.target.value})} className="p-2 bg-white border border-indigo-200 rounded-xl text-[10px] font-bold outline-none"/>
                                            </div>
                                            
                                            {varForm.nome === "Outro" && (
                                                <input 
                                                    type="text" 
                                                    placeholder="Nome da Variedade" 
                                                    value={varForm.customNome} 
                                                    onChange={e => setVarForm({...varForm, customNome: e.target.value})} 
                                                    className="w-full p-2 bg-white border border-indigo-400 rounded-xl text-[10px] font-bold outline-none"
                                                />
                                            )}

                                            <div className="flex gap-2">
                                                <div className="flex-1 flex bg-white border border-indigo-200 rounded-xl overflow-hidden p-1">
                                                    <button type="button" onClick={() => setVarForm({...varForm, lado: 'A'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg transition-all ${varForm.lado === 'A' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>SETOR A</button>
                                                    <button type="button" onClick={() => setVarForm({...varForm, lado: 'B'})} className={`flex-1 py-1 text-[9px] font-black rounded-lg transition-all ${varForm.lado === 'B' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>SETOR B</button>
                                                </div>
                                                <button type="button" onClick={handleAddVariedade} className="bg-indigo-600 text-white px-4 rounded-xl hover:bg-indigo-700 transition-colors">
                                                    <SvgIcon name="plus" />
                                                </button>
                                            </div>
                                        </div>

                                        {perdasVariedade.length > 0 && (
                                            <div className="max-h-24 overflow-y-auto custom-scroll space-y-1 mt-2">
                                                {perdasVariedade.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center bg-white p-2 rounded-xl border border-indigo-100 text-[9px] font-bold">
                                                        <span className="text-indigo-900">{p.nome} (S{p.lado})</span>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-slate-900">{p.qtd} un</span>
                                                            <button type="button" onClick={() => setPerdasVariedade(perdasVariedade.filter(x => x.id !== p.id))} className="text-red-400 hover:text-red-600">
                                                                <SvgIcon name="trash" className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* MUDAS E BANDEJAS */}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-slate-900 p-3 rounded-2xl text-center">
                                            <label className="text-[8px] font-black text-slate-500 uppercase block mb-1">Bandejas</label>
                                            <input type="number" value={formData.totalBandejas} onChange={e => setFormData({...formData, totalBandejas: e.target.value})} className="w-full bg-transparent text-white text-center text-xl font-black outline-none" required />
                                        </div>
                                        <div className="bg-emerald-900 p-3 rounded-2xl text-center flex flex-col justify-center">
                                            <label className="text-[8px] font-black text-emerald-400 uppercase block mb-1">Mudas Totais</label>
                                            <div className="text-white text-lg font-black leading-none">{formatNumber(calculosGerais.totalMudas)}</div>
                                        </div>
                                    </div>

                                    {/* VOLUME TRANSPLANTADO */}
                                    <div className="p-4 bg-emerald-50 rounded-2xl border border-emerald-200">
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-[8px] font-black text-emerald-700 uppercase tracking-widest">Transplantado (Mudas)</label>
                                            <span className="bg-emerald-200 text-emerald-900 text-[9px] font-black px-2 py-0.5 rounded-lg">SOMA: {formatNumber(calculosGerais.totalTrans)}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="number" placeholder="Setor A" value={formData.transplantadoA} onChange={e => setFormData({...formData, transplantadoA: e.target.value})} className="w-full p-2 bg-white rounded-xl text-center text-sm font-black outline-none border border-emerald-100" required />
                                            <input type="number" placeholder="Setor B" value={formData.transplantadoB} onChange={e => setFormData({...formData, transplantadoB: e.target.value})} className="w-full p-2 bg-white rounded-xl text-center text-sm font-black outline-none border border-emerald-100" required />
                                        </div>
                                    </div>

                                    {/* PERDA 01 - TRANSPLANTIO */}
                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[8px] font-black text-orange-700 uppercase tracking-widest">Perda de Transplantio</label>
                                            <span className="pct-badge bg-orange-200 text-orange-800 text-[10px] font-black">{calculosGerais.percPerdaLote}%</span>
                                        </div>
                                        <input type="number" placeholder="0" value={formData.totalPerdasLote} onChange={e => setFormData({...formData, totalPerdasLote: e.target.value})} className="w-full bg-transparent text-xl text-center font-black text-orange-900 outline-none" required />
                                    </div>

                                    {/* PERDA 02 - PÓS (CÁLCULO AUTOMÁTICO) */}
                                    <div className="bg-red-50 p-4 rounded-2xl border border-red-200 space-y-3 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-2 opacity-10">
                                            <SvgIcon name="alert" className="w-10 h-10 text-red-900" />
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <label className="text-[8px] font-black text-red-700 uppercase tracking-widest">Perdas Pós-Transplantio</label>
                                            <span className="pct-badge bg-red-200 text-red-800 text-[10px] font-black">{calculosGerais.percPos}%</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-white/60 p-2 rounded-xl text-center border border-red-100">
                                                <p className="text-[7px] font-black text-red-400 uppercase leading-none mb-1">Automático Setor A</p>
                                                <p className="text-sm font-black text-red-900">{formatNumber(calculosGerais.pPosA)}</p>
                                            </div>
                                            <div className="bg-white/60 p-2 rounded-xl text-center border border-red-100">
                                                <p className="text-[7px] font-black text-red-400 uppercase leading-none mb-1">Automático Setor B</p>
                                                <p className="text-sm font-black text-red-900">{formatNumber(calculosGerais.pPosB)}</p>
                                            </div>
                                        </div>
                                        <div className="text-center pt-1">
                                            <p className="text-[8px] font-bold text-red-300 italic uppercase">Calculado a partir do detalhamento por variedade</p>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-[#062C1B] text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2">
                                        <SvgIcon name="check" /> Finalizar Registro
                                    </button>
                                </form>
                            </div>
                        </aside>

                        {/* LISTAGEM DE REGISTROS SALVOS */}
                        <section className="space-y-4">
                            {registros.length === 0 ? (
                                <div className="bg-white p-16 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                                    <p className="text-slate-400 font-bold uppercase text-[9px] tracking-widest">Nenhum registro no banco de dados.</p>
                                </div>
                            ) : (
                                registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[2rem] p-6 card-shadow border border-slate-200 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-2 h-full bg-emerald-600"></div>
                                        
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-slate-100 p-2 rounded-xl text-slate-600"><SvgIcon name="calendar" className="w-5 h-5"/></div>
                                                <div>
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Relatório de Monitoramento</p>
                                                        <span className="bg-emerald-100 text-emerald-700 text-[8px] font-black px-2 py-0.5 rounded-full uppercase">{reg.blocoTalhao}</span>
                                                    </div>
                                                    <p className="text-lg font-black text-slate-900">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => save(registros.filter(r => r.id !== reg.id))} className="text-slate-200 hover:text-red-500 transition-colors">
                                                <SvgIcon name="trash" className="w-5 h-5" />
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                            <div className="bg-slate-900 text-white rounded-[1.5rem] p-4 text-center flex flex-col justify-center">
                                                <p className="text-[8px] font-black text-slate-500 uppercase mb-1">Mudas Iniciais</p>
                                                <p className="text-3xl font-black">{formatNumber(reg.totalMudas)}</p>
                                                <p className="text-[8px] font-bold text-slate-500 mt-2 uppercase">{reg.totalBandejas} BDJ</p>
                                            </div>

                                            <div className="md:col-span-3 bg-white border border-slate-100 rounded-[1.5rem] overflow-hidden grid grid-cols-2">
                                                <div className="bg-emerald-50 p-4 border-r border-slate-100 flex flex-col justify-center items-center">
                                                    <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">Transplantado Total</p>
                                                    <p className="text-3xl font-black text-emerald-950">{formatNumber(reg.totalTransplantado)}</p>
                                                    <div className="flex gap-4 mt-2">
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-emerald-400 uppercase leading-none">Setor A</p>
                                                            <p className="text-xs font-black text-emerald-800">{formatNumber(reg.transplantadoA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-emerald-400 uppercase leading-none">Setor B</p>
                                                            <p className="text-xs font-black text-emerald-800">{formatNumber(reg.transplantadoB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-red-50 p-4 flex flex-col justify-center items-center">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <p className="text-[10px] font-black text-red-600 uppercase tracking-widest">Perda Pós</p>
                                                        <span className="pct-badge bg-red-200 text-red-800 text-[10px] font-black">{reg.percPos}%</span>
                                                    </div>
                                                    <p className="text-3xl font-black text-red-950">{formatNumber(reg.totalPerdasPos)}</p>
                                                    <div className="flex gap-4 mt-2">
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-red-400 uppercase leading-none">Setor A</p>
                                                            <p className="text-xs font-black text-red-800">{formatNumber(reg.perdaPosA)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[7px] font-bold text-red-400 uppercase leading-none">Setor B</p>
                                                            <p className="text-xs font-black text-red-800">{formatNumber(reg.perdaPosB)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {reg.perdasDetalhadas && reg.perdasDetalhadas.length > 0 && (
                                            <div className="mb-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">Nome Completo das Variedades Perdidas</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {reg.perdasDetalhadas.map((p, idx) => (
                                                        <div key={idx} className="bg-white px-4 py-2 rounded-xl border border-slate-100 flex items-center gap-4">
                                                            <p className="text-xs font-black text-slate-800 uppercase">{p.nome} (S{p.lado})</p>
                                                            <span className="bg-indigo-50 text-indigo-700 text-[10px] font-black px-2 py-0.5 rounded-lg">{p.qtd}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <div className="flex justify-between items-center bg-orange-50 px-6 py-5 rounded-2xl border border-orange-100">
                                                <div className="flex items-center gap-3">
                                                    <p className="text-[10px] font-black text-orange-700 uppercase tracking-widest">Perda Transplantio</p>
                                                    <span className="pct-badge bg-orange-200 text-orange-800 text-[10px] font-black">{reg.percPerdaLote}%</span>
                                                </div>
                                                <p className="text-2xl font-black text-orange-950 leading-none">{formatNumber(reg.totalPerdasLote)}</p>
                                            </div>

                                            <div className="flex justify-between items-center bg-slate-900 px-6 py-5 rounded-2xl shadow-xl border-b-4 border-slate-800">
                                                <div className="flex items-center gap-3">
                                                    <div className="p-1.5 bg-red-600 rounded text-white shadow-lg"><SvgIcon name="alert" className="w-4 h-4" /></div>
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Total de Perdas do Bloco</p>
                                                        <p className="text-[8px] font-bold text-emerald-400 uppercase tracking-widest">{formatNumber(reg.perdaAcumulada)} Mudas no Total</p>
                                                    </div>
                                                </div>
                                                <div className="pct-badge bg-red-600 text-white min-w-[60px] text-lg font-black shadow-xl ring-2 ring-red-500/50">
                                                    {reg.percGeral}%
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </section>
                    </main>

                    {/* PDF RENDER CONTAINER (ESTILO ELEGANTE) */}
                    {showExport && (
                        <div id="export-container" ref={reportRef}>
                            <div className="flex justify-between items-end border-b-8 border-[#062C1B] pb-12 mb-14">
                                <div className="flex items-center gap-10">
                                    <img src={OASIS_LOGO_URL} alt="Logo" className="h-28" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="text-6xl font-black text-[#062C1B] uppercase tracking-tighter leading-none">Relatório de Perdas</h1>
                                        <p className="text-xl font-bold text-emerald-600 uppercase tracking-[0.4em] mt-4 italic">Oásis Inteligência Agrícola</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-4xl font-black text-slate-900">{new Date().toLocaleDateString('pt-BR')}</p>
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mt-2">Documento de Campo</p>
                                </div>
                            </div>

                            {registros.map((reg) => (
                                <div key={reg.id} className="relative bg-white p-12 rounded-[4rem] border border-slate-100 mb-16 shadow-lg">
                                    <div className="absolute top-0 left-0 w-5 h-full bg-[#062C1B]"></div>
                                    
                                    <div className="flex justify-between items-start mb-12">
                                        <div>
                                            <p className="text-lg font-black text-emerald-600 uppercase tracking-[0.3em] mb-2">{reg.blocoTalhao}</p>
                                            <p className="text-7xl font-black text-slate-900 tracking-tighter">{reg.dataContagem.split('-').reverse().join('/')}</p>
                                        </div>
                                        <div className="bg-slate-900 px-12 py-8 rounded-[2rem] text-center text-white">
                                            <p className="text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Próxima Visita</p>
                                            <p className="text-3xl font-black text-emerald-400">{reg.proximaContagem ? reg.proximaContagem.split('-').reverse().join('/') : "--/--/--"}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-8 mb-10">
                                        <div className="bg-slate-50 rounded-[2.5rem] p-10 text-center flex flex-col justify-center border border-slate-200">
                                            <p className="text-sm font-black text-slate-500 uppercase mb-4 tracking-widest">Mudas Totais</p>
                                            <p className="text-6xl font-black text-slate-950">{formatNumber(reg.totalMudas)}</p>
                                        </div>
                                        
                                        <div className="col-span-3 grid grid-cols-2 rounded-[2.5rem] overflow-hidden border-2 border-slate-100 shadow-sm">
                                            <div className="bg-emerald-50 p-12 flex flex-col items-center justify-center border-r-2 border-white">
                                                <p className="text-sm font-black text-emerald-600 uppercase mb-6 tracking-widest">Transplantado Total</p>
                                                <p className="text-7xl font-black text-emerald-950 mb-10 leading-none">{formatNumber(reg.totalTransplantado)}</p>
                                                <div className="flex justify-around w-full border-t border-emerald-200 pt-8">
                                                    <div className="text-center">
                                                        <p className="text-xs font-black text-emerald-400 uppercase mb-2">Setor A</p>
                                                        <p className="text-4xl font-black text-emerald-800">{formatNumber(reg.transplantadoA)}</p>
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-xs font-black text-emerald-400 uppercase mb-2">Setor B</p>
                                                        <p className="text-4xl font-black text-emerald-800">{formatNumber(reg.transplantadoB)}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="bg-red-50 p-12 flex flex-col items-center justify-center">
                                                <div className="flex items-center gap-6 mb-6">
                                                    <p className="text-sm font-black text-red-600 uppercase tracking-widest">Perdas Pós-T</p>
                                                    <span className="pct-badge bg-red-200 text-red-800 text-2xl font-black px-6 py-2">{reg.percPos}%</span>
                                                </div>
                                                <p className="text-7xl font-black text-red-950 mb-10 leading-none">{formatNumber(reg.totalPerdasPos)}</p>
                                                <div className="flex justify-around w-full border-t border-red-200 pt-8">
                                                    <div className="text-center">
                                                        <p className="text-xs font-black text-red-400 uppercase mb-2">Setor A</p>
                                                        <p className="text-4xl font-black text-red-800">{formatNumber(reg.perdaPosA)}</p>
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-xs font-black text-red-400 uppercase mb-2">Setor B</p>
                                                        <p className="text-4xl font-black text-red-800">{formatNumber(reg.perdaPosB)}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {reg.perdasDetalhadas && reg.perdasDetalhadas.length > 0 && (
                                        <div className="mb-10 bg-slate-50 p-10 rounded-[3rem] border border-slate-200">
                                            <p className="text-sm font-black text-slate-400 uppercase tracking-[0.5em] mb-8">Composição de Variedades (Perdas)</p>
                                            <div className="flex flex-wrap gap-6">
                                                {reg.perdasDetalhadas.map((p, idx) => (
                                                    <div key={idx} className="bg-white px-10 py-6 rounded-3xl border border-slate-200 flex items-center gap-10 shadow-sm">
                                                        <p className="text-2xl font-black text-slate-900 uppercase">{p.nome} (S{p.lado})</p>
                                                        <p className="text-5xl font-black text-indigo-600 border-l-4 border-slate-50 pl-10">{p.qtd}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="flex justify-between items-center bg-orange-50 px-12 py-10 rounded-[3rem] border border-orange-100 shadow-sm">
                                            <div className="flex items-center gap-8">
                                                <p className="text-sm font-black text-orange-700 uppercase tracking-widest">Perda Transplantio</p>
                                                <span className="pct-badge bg-orange-200 text-orange-800 text-2xl font-black px-6 py-2">{reg.percPerdaLote}%</span>
                                            </div>
                                            <p className="text-6xl font-black text-orange-950">{formatNumber(reg.totalPerdasLote)}</p>
                                        </div>

                                        <div className="flex justify-between items-center bg-[#062C1B] px-12 py-10 rounded-[3rem] shadow-2xl border-b-[10px] border-[#041d12]">
                                            <div className="flex flex-col">
                                                <p className="text-2xl font-black text-emerald-400 uppercase tracking-[0.2em] mb-2">Índice Geral</p>
                                                <p className="text-sm font-bold text-white uppercase tracking-widest">{formatNumber(reg.perdaAcumulada)} Mudas Perdidas</p>
                                            </div>
                                            <div className="pct-badge bg-red-600 text-white min-w-[120px] text-5xl py-6 px-8 shadow-2xl font-black ring-8 ring-red-500/20">
                                                {reg.percGeral}%
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            <div className="mt-20 text-center text-slate-300 font-black uppercase tracking-[0.8em] text-sm">
                                Documento Gerado pelo Sistema de Monitoramento Oásis
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
